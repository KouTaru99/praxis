id: mf-08
title: 'market-feed: đóng gói Docker + volume dữ liệu cho record/replay'
order: 8
est_minutes: 25
commit_ref: 7a52475
goal: 'Viết Dockerfile multi-stage cho market-feed, và thêm Docker volume /data để file NDJSON (record) sống sót qua việc restart container.'
deliverable: market-feed/Dockerfile + volume market-feed-data trong docker-compose.
outcome_preview: 'docker compose --profile feed up build ra image chạy được cả 3 chế độ; file record ở lần chạy trước vẫn còn đó cho lần replay sau, kể cả sau khi container đã tắt bật lại.'
blocks:
- type: prose
  content: 'Dockerfile theo đúng khuôn multi-stage đã dùng ở Chặng 2 (build bằng `eclipse-temurin:21-jdk`, chạy bằng `-jre-alpine` nhẹ hơn) — điểm mới ở đây là khai báo `VOLUME ["/data"]`:'
- type: code
  filename: market-feed/Dockerfile
  lang: dockerfile
  content: |
    # Stage 1: Build
    FROM eclipse-temurin:21-jdk AS builder
    WORKDIR /workspace
    COPY gradlew ./
    COPY gradle gradle/
    COPY build.gradle.kts settings.gradle.kts gradle.properties ./
    COPY common/build.gradle.kts       common/build.gradle.kts
    COPY market-feed/build.gradle.kts  market-feed/build.gradle.kts
    # ... build.gradle.kts của các subproject còn lại (Gradle cần để evaluate settings) ...
    COPY common/src      common/src
    COPY market-feed/src market-feed/src
    RUN --mount=type=cache,target=/root/.gradle chmod +x gradlew && ./gradlew :market-feed:bootJar --no-daemon -x test

    # Stage 2: Runtime
    FROM eclipse-temurin:21-jre-alpine
    RUN addgroup -S appgroup && adduser -S appuser -G appgroup
    WORKDIR /app
    COPY --from=builder /workspace/market-feed/build/libs/market-feed.jar app.jar

    # Thư mục /data cho record (ghi NDJSON) / replay (đọc NDJSON) — appuser phải ghi được
    RUN mkdir -p /data && chown appuser:appgroup /data
    VOLUME ["/data"]

    USER appuser
    EXPOSE 8082
    ENTRYPOINT ["java", "-Xmx256m", "-jar", "app.jar"]
- type: code
  filename: infra/docker-compose.yml (thêm)
  lang: yaml
  content: |
    services:
      market-feed:
        # ... build, environment (FEED_MODE, FEED_SYMBOLS, REPLAY_FILE...) ...
        volumes:
          - market-feed-data:/data
        depends_on:
          rabbitmq:
            condition: service_healthy
        healthcheck:
          test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]
          interval: 15s
          timeout: 5s
          retries: 5

    volumes:
      market-feed-data:
- type: callout
  variant: warning
  content: '**Bẫy tái diễn: `curl` không có trong `eclipse-temurin:*-jre-alpine`.** Alpine Linux tối giản, không cài sẵn `curl`; healthcheck viết `curl -sf ...` sẽ luôn báo "unhealthy" dù service chạy hoàn toàn bình thường — vì lệnh `curl` bản thân không tồn tại, không phải vì health-endpoint lỗi. `wget` thì Alpine có sẵn (busybox). Cùng 1 bẫy đã gặp ở Chặng 2, nay chủ động né ngay từ đầu thay vì chờ dính lại.'
- type: callout
  variant: info
  content: '**Vì sao volume, không phải bind-mount thư mục host?** Named volume (`market-feed-data:/data`) do Docker quản lý, sống độc lập với container — `docker compose down` (không `-v`) không xoá volume, dữ liệu record vẫn còn khi bạn `up` lại. Bind-mount thư mục host cũng làm được việc này, nhưng named volume tránh phải lo về quyền file giữa host và container (UID/GID lệch nhau là lỗi rất hay gặp).'
- type: command
  label: Build + lưu mốc bước 3.8
  content: |
    docker compose -f infra/docker-compose.yml --env-file infra/.env --profile feed build market-feed
    git add infra/docker-compose.yml market-feed/Dockerfile
    git commit -m "[step-3.8] market-feed: Dockerfile multi-stage (+/data volume) + fix healthcheck curl->wget + market-feed-data volume"
- type: resource
  kind: docs
  label: Commit đối chiếu trên repo mẫu (step-3.8)
