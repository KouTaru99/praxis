id: mf-02
title: 'market-feed: topology RabbitMQ + TradePublisher'
order: 2
est_minutes: 20
commit_ref: f43524a
goal: 'Khai báo exchange market-pulse.trades (fanout) và viết TradePublisher — điểm cuối mọi trade sẽ đi qua, bất kể tới từ live hay replay.'
deliverable: RabbitConfig (FanoutExchange + JSON converter) + TradePublisher.
outcome_preview: 'market-feed đã có "cửa ra" — bất kỳ trade nào tạo ra ở các bước sau chỉ cần gọi publisher.publish(event) là tự động lên RabbitMQ.'
blocks:
- type: prose
  content: |
    Trước khi viết logic nối Binance (sẽ làm ở các bước sau), dựng trước **đường ống RabbitMQ** — nơi mọi trade cuối cùng đổ vào. Dùng **fanout exchange**: mọi consumer bind vào exchange này đều nhận được TOÀN BỘ trade, không cần biết trước ai sẽ nghe (ở Chặng 4, `aggregation` sẽ là consumer đầu tiên).
- type: code
  filename: market-feed/src/main/java/com/marketpulse/marketfeed/config/RabbitConfig.java
  lang: java
  content: |
    package com.marketpulse.marketfeed.config;

    import org.springframework.amqp.core.FanoutExchange;
    import org.springframework.amqp.support.converter.Jackson2JsonMessageConverter;
    import org.springframework.context.annotation.Bean;
    import org.springframework.context.annotation.Configuration;

    @Configuration
    public class RabbitConfig {

        public static final String EXCHANGE_NAME = "market-pulse.trades";

        @Bean
        public FanoutExchange tradesExchange() {
            return new FanoutExchange(EXCHANGE_NAME, true, false);
        }

        @Bean
        public Jackson2JsonMessageConverter jackson2JsonMessageConverter() {
            return new Jackson2JsonMessageConverter();
        }
    }
- type: prose
  content: 'TradePublisher có 2 chữ ký: `publish(event)` cho luồng bình thường, và `publish(event, replay=true)` gắn thêm header `x-replay` — đánh dấu trade này tới từ file phát lại, không phải thị trường sống. Các service tiêu thụ (Chặng 4, 5) có thể đọc header này nếu cần phân biệt.'
- type: code
  filename: market-feed/src/main/java/com/marketpulse/marketfeed/publisher/TradePublisher.java
  lang: java
  content: |
    package com.marketpulse.marketfeed.publisher;

    import com.marketpulse.common.event.TradeEvent;
    import com.marketpulse.marketfeed.config.RabbitConfig;
    import org.slf4j.Logger;
    import org.slf4j.LoggerFactory;
    import org.springframework.amqp.rabbit.core.RabbitTemplate;
    import org.springframework.stereotype.Component;

    @Component
    public class TradePublisher {

        private static final Logger log = LoggerFactory.getLogger(TradePublisher.class);

        private final RabbitTemplate rabbitTemplate;

        public TradePublisher(RabbitTemplate rabbitTemplate) {
            this.rabbitTemplate = rabbitTemplate;
        }

        public void publish(TradeEvent event) {
            publish(event, false);
        }

        public void publish(TradeEvent event, boolean replay) {
            rabbitTemplate.convertAndSend(RabbitConfig.EXCHANGE_NAME, event.symbol(), event, msg -> {
                if (replay) {
                    msg.getMessageProperties().setHeader("x-replay", true);
                }
                return msg;
            });
            log.debug("Published trade: symbol={} price={}", event.symbol(), event.price());
        }
    }
- type: callout
  variant: info
  content: '**Vì sao routing key = `event.symbol()` trên một fanout exchange?** Fanout thực ra bỏ qua routing key hoàn toàn — mọi binding đều nhận hết. Truyền `symbol()` vào đây không đổi hành vi định tuyến, nhưng nó hiện trong log/UI quản trị RabbitMQ, giúp debug dễ hơn khi soi message trôi qua. Một thói quen nhỏ, không tốn gì, lợi lúc vận hành.'
