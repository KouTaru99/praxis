    @Component
    @ConditionalOnProperty(name = "feed.mode", havingValue = "live")
    public class LiveFeed {

        private final BinanceWsClient wsClient;
        private final TradePublisher publisher;

        public LiveFeed(BinanceWsClient wsClient, TradePublisher publisher) {
            this.wsClient = wsClient;
            this.publisher = publisher;
        }

        public void start() {
            wsClient.start(publisher::publish);
        }

        @PreDestroy
        public void stop() {
            wsClient.stop();
        }
    }
