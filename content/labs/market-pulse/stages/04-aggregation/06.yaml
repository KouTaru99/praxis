goal: 'Viết CandleFlusher chạy định kỳ (@Scheduled): rút các nến đã đóng phút ra khỏi bộ nhớ, lưu DB idempotent, publish Candle1mEvent. Đây là bước khép kín toàn bộ luồng Chặng 4.'
