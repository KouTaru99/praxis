- type: prose
  content: '**RabbitConfig** khai lại chính exchange `market-pulse.alerts` mà rule-engine đã khai ở Chặng 5 — an toàn vì khai với cùng thuộc tính (direct, durable) là *idempotent*; RabbitMQ không phàn nàn khi hai service cùng khai một exchange giống hệt nhau. Mục đích thật sự ở đây là mở **queue riêng** `alert-delivery.alerts` và buộc (bind) nó vào exchange đó — để alert-delivery nhận được bản sao của mọi alert mà không ảnh hưởng tới queue của service khác.'
- type: code
  filename: alert-delivery/src/main/java/com/marketpulse/alertdelivery/config/RabbitConfig.java
  lang: java
  content: |
    package com.marketpulse.alertdelivery.config;

    import org.springframework.amqp.core.*;
    import org.springframework.amqp.support.converter.DefaultJackson2JavaTypeMapper;
    import org.springframework.amqp.support.converter.Jackson2JsonMessageConverter;
    import org.springframework.context.annotation.Bean;
    import org.springframework.context.annotation.Configuration;

    @Configuration
    public class RabbitConfig {

        // exchange này do rule-engine khai báo trước (Chặng 5); khai lại ở đây là idempotent
        // vì cùng thuộc tính (direct, durable, không auto-delete) — chỉ để mở queue riêng.
        public static final String ALERTS_EXCHANGE = "market-pulse.alerts";
        public static final String ALERTS_QUEUE = "alert-delivery.alerts";
        public static final String ALERTS_ROUTING_KEY = "alert";

        @Bean
        public DirectExchange alertsExchange() {
            return new DirectExchange(ALERTS_EXCHANGE, true, false);
        }

        @Bean
        public Queue alertsQueue() {
            return new Queue(ALERTS_QUEUE, true);
        }

        @Bean
        public Binding alertsBinding(Queue alertsQueue, DirectExchange alertsExchange) {
            return BindingBuilder.bind(alertsQueue).to(alertsExchange).with(ALERTS_ROUTING_KEY);
        }

        @Bean
        public Jackson2JsonMessageConverter jackson2JsonMessageConverter() {
            DefaultJackson2JavaTypeMapper typeMapper = new DefaultJackson2JavaTypeMapper();
            typeMapper.setTrustedPackages("com.marketpulse.*");
            Jackson2JsonMessageConverter converter = new Jackson2JsonMessageConverter();
            converter.setClassMapper(typeMapper);
            return converter;
        }
    }
- type: callout
  variant: info
  content: '`trustedPackages("com.marketpulse.*")` bắt buộc phải có: `AlertTriggeredEvent` là một Java record định nghĩa trong module `common`, và Jackson cần biết deserialize JSON nhận từ queue thành đúng class nào — nếu không khai, mặc định Spring sẽ TỪ CHỐI deserialize (chống tấn công deserialization), y hệt bẫy đã gặp ở CandleFlusher Chặng 4.'
