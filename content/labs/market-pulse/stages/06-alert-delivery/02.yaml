goal: Viết 2 entity JPA, 2 repository, và cấu hình RabbitMQ để alert-delivery mở queue riêng lắng nghe exchange alerts.
deliverable: Alert + AlertDeliveryAttempt entity (encapsulation qua method nghiệp vụ) + 2 repository + RabbitConfig.
outcome_preview: Sau bước này, alert-delivery đã có tầng dữ liệu đầy đủ và đã đăng ký lắng nghe đúng exchange rule-engine bắn ra.
blocks:
- type: prose
  content: Hai **entity** ánh xạ 2 bảng. Chú ý `Alert` không có setter cho `status` — chỉ có 3 method nghiệp vụ `markDelivered()/markClientError()/markFailed()`. Cách này buộc mọi thay đổi trạng thái phải đi qua một trong ba con đường có ý nghĩa rõ ràng, thay vì gán chuỗi tuỳ tiện ở đâu đó.
- type: code
  filename: alert-delivery/src/main/java/com/marketpulse/alertdelivery/domain/Alert.java
  lang: java
  content: |
    package com.marketpulse.alertdelivery.domain;

    import jakarta.persistence.*;
    import org.hibernate.annotations.CreationTimestamp;

    import java.time.OffsetDateTime;
    import java.util.UUID;

    @Entity
    @Table(name = "alerts")
    public class Alert {

        @Id
        private UUID id;

        @Column(name = "rule_id", nullable = false)
        private UUID ruleId;

        @Column(name = "tenant_id", nullable = false)
        private UUID tenantId;

        @Column(nullable = false, length = 20)
        private String symbol;

        @Column(name = "rule_type", nullable = false, length = 30)
        private String ruleType;

        @Column(name = "triggered_at", nullable = false)
        private OffsetDateTime triggeredAt;

        @Column(name = "trigger_value", nullable = false, length = 50)
        private String triggerValue;

        @Column(name = "webhook_url", nullable = false, length = 500)
        private String webhookUrl;

        @Column(nullable = false, length = 20)
        private String status = "PENDING";

        @CreationTimestamp
        @Column(name = "created_at", nullable = false, updatable = false)
        private OffsetDateTime createdAt;

        protected Alert() {}

        public Alert(UUID id, UUID ruleId, UUID tenantId, String symbol, String ruleType,
                     OffsetDateTime triggeredAt, String triggerValue, String webhookUrl) {
            this.id = id;
            this.ruleId = ruleId;
            this.tenantId = tenantId;
            this.symbol = symbol;
            this.ruleType = ruleType;
            this.triggeredAt = triggeredAt;
            this.triggerValue = triggerValue;
            this.webhookUrl = webhookUrl;
        }

        public void markDelivered() { this.status = "DELIVERED"; }
        public void markClientError() { this.status = "CLIENT_ERROR"; }
        public void markFailed() { this.status = "FAILED"; }

        public UUID getId() { return id; }
        public UUID getRuleId() { return ruleId; }
        public UUID getTenantId() { return tenantId; }
        public String getSymbol() { return symbol; }
        public String getRuleType() { return ruleType; }
        public OffsetDateTime getTriggeredAt() { return triggeredAt; }
        public String getTriggerValue() { return triggerValue; }
        public String getWebhookUrl() { return webhookUrl; }
        public String getStatus() { return status; }
        public OffsetDateTime getCreatedAt() { return createdAt; }
    }
- type: code
  filename: alert-delivery/src/main/java/com/marketpulse/alertdelivery/domain/AlertDeliveryAttempt.java
  lang: java
  content: |
    package com.marketpulse.alertdelivery.domain;

    import jakarta.persistence.*;
    import org.hibernate.annotations.CreationTimestamp;

    import java.time.OffsetDateTime;
    import java.util.UUID;

    @Entity
    @Table(name = "alert_delivery_attempts")
    public class AlertDeliveryAttempt {

        @Id
        @GeneratedValue(strategy = GenerationType.IDENTITY)
        private Long id;

        @Column(name = "alert_id", nullable = false)
        private UUID alertId;

        @Column(name = "attempt_number", nullable = false)
        private int attemptNumber;

        @CreationTimestamp
        @Column(name = "attempted_at", nullable = false, updatable = false)
        private OffsetDateTime attemptedAt;

        /** null khi không có response thật (timeout / connection refused). */
        @Column(name = "http_status")
        private Integer httpStatus;

        @Column(nullable = false, length = 20)
        private String outcome;

        protected AlertDeliveryAttempt() {}

        public AlertDeliveryAttempt(UUID alertId, int attemptNumber, Integer httpStatus, String outcome) {
            this.alertId = alertId;
            this.attemptNumber = attemptNumber;
            this.httpStatus = httpStatus;
            this.outcome = outcome;
        }

        public Long getId() { return id; }
        public UUID getAlertId() { return alertId; }
        public int getAttemptNumber() { return attemptNumber; }
        public OffsetDateTime getAttemptedAt() { return attemptedAt; }
        public Integer getHttpStatus() { return httpStatus; }
        public String getOutcome() { return outcome; }
    }
