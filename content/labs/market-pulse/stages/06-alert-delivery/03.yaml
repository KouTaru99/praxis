    package com.marketpulse.alertdelivery.client;

    /**
     * Payload gửi tới webhookUrl của tenant — CHỈ đúng 6 field theo R04, không kèm
     * tenantId/webhookUrl (thông tin nội bộ, không cần lộ ra ngoài).
     */
    public record WebhookPayload(
            String alertId, String ruleId, String symbol,
            String ruleType, String triggeredAt, String triggerValue
    ) {}
- type: prose
  content: '`DeliveryAttemptResult` gói kết quả một lần gửi và biết tự trả lời câu hỏi "có nên thử lại không":'
- type: code
  filename: alert-delivery/src/main/java/com/marketpulse/alertdelivery/client/DeliveryAttemptResult.java
  lang: java
  content: |
    package com.marketpulse.alertdelivery.client;

    /** outcome: SUCCESS | CLIENT_ERROR | SERVER_ERROR | TIMEOUT. httpStatus null nếu không có response thật. */
    public record DeliveryAttemptResult(String outcome, Integer httpStatus) {

        public static DeliveryAttemptResult success(int status) {
            return new DeliveryAttemptResult("SUCCESS", status);
        }

        public static DeliveryAttemptResult clientError(int status) {
            return new DeliveryAttemptResult("CLIENT_ERROR", status);
        }

        public static DeliveryAttemptResult serverError(int status) {
            return new DeliveryAttemptResult("SERVER_ERROR", status);
        }

        public static DeliveryAttemptResult timeout() {
            return new DeliveryAttemptResult("TIMEOUT", null);
        }

        public boolean isRetryable() {
            return "SERVER_ERROR".equals(outcome) || "TIMEOUT".equals(outcome);
        }
    }
- type: callout
  variant: info
  content: 'Phân biệt `CLIENT_ERROR` (4xx) khỏi `SERVER_ERROR`/`TIMEOUT` (5xx/timeout) không phải chi tiết vặt: 4xx nghĩa là endpoint của TENANT chủ động từ chối (URL sai, xác thực sai, payload họ không chấp nhận) — gửi lại y hệt request đó 3 lần nữa cũng vẫn 4xx, chỉ tổ làm phiền. 5xx/timeout thường là sự cố *tạm thời* (server tenant quá tải, mạng chập chờn) — đáng thử lại. Đây là lý do `isRetryable()` chỉ trả `true` cho hai loại sau.'
- type: callout
  variant: tip
  content: 'Timeout 5 giây là một lựa chọn cân bằng: đủ dài để một webhook hơi chậm vẫn kịp trả lời, đủ ngắn để không giữ luồng xử lý alert quá lâu nếu endpoint tenant treo hẳn.'
