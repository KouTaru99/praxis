  variant: info
  content: 'Milestone Chặng 6 đạt: profile delivery chạy được, webhook thật nhận đúng payload, retry đúng chính sách. Chặng 7 tiếp tục Phần C với billing — đo lượng dùng và chặn khi tenant vượt hạn mức gói cước.'
