    package com.marketpulse.alertdelivery.dto;

    import com.marketpulse.alertdelivery.domain.Alert;

    import java.time.OffsetDateTime;
    import java.util.List;
    import java.util.UUID;

    public record AlertDetailResponse(
            UUID id, UUID ruleId, String symbol, String ruleType,
            OffsetDateTime triggeredAt, String triggerValue, String status, OffsetDateTime createdAt,
            List<AlertAttemptResponse> attempts
    ) {
        public static AlertDetailResponse from(Alert a, List<AlertAttemptResponse> attempts) {
            return new AlertDetailResponse(a.getId(), a.getRuleId(), a.getSymbol(), a.getRuleType(),
                    a.getTriggeredAt(), a.getTriggerValue(), a.getStatus(), a.getCreatedAt(), attempts);
        }
    }
