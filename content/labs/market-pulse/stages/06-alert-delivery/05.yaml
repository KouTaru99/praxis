    package com.marketpulse.alertdelivery.dto;

    import com.marketpulse.alertdelivery.domain.Alert;

    import java.time.OffsetDateTime;
    import java.util.UUID;

    public record AlertResponse(
            UUID id, UUID ruleId, String symbol, String ruleType,
            OffsetDateTime triggeredAt, String triggerValue, String status, OffsetDateTime createdAt
    ) {
        public static AlertResponse from(Alert a) {
            return new AlertResponse(a.getId(), a.getRuleId(), a.getSymbol(), a.getRuleType(),
                    a.getTriggeredAt(), a.getTriggerValue(), a.getStatus(), a.getCreatedAt());
        }
    }
