id: gi-03
title: 'identity: REST API công khai /api/v1/keys'
order: 3
est_minutes: 30
commit_ref: 0a36cbf
goal: 'Mở REST API để tenant tự quản lý key: tạo (POST), liệt kê (GET), thu hồi (DELETE) — kèm xử lý lỗi tập trung.'
deliverable: KeyController (3 endpoint) + 5 DTO + GlobalExceptionHandler (404 KEY_NOT_FOUND, 400 validation).
outcome_preview: 'Sau bước này, identity có API công khai đầy đủ để đời sống một API key: sinh ra, xem, thu hồi — với mã lỗi rõ ràng thay vì stacktrace.'
blocks:
- type: prose
  content: 'Tầng ngoài cùng: **REST controller** phơi 3 endpoint dưới `/api/v1/keys`. Chú ý các endpoint đọc `X-Tenant-Id` từ **header** chứ không nhận trong body — vì header này do gateway gắn vào sau khi xác thực (bước 2.6). Controller ở đây tin tưởng header đó, còn việc xác thực là của gateway. Đây là *phân tách trách nhiệm* điển hình của kiến trúc có cổng vào.'
- type: code
  filename: identity/src/main/java/com/marketpulse/identity/controller/KeyController.java
  lang: java
  content: |
    package com.marketpulse.identity.controller;

    import com.marketpulse.identity.dto.CreateKeyRequest;
    import com.marketpulse.identity.dto.CreateKeyResponse;
    import com.marketpulse.identity.dto.KeySummaryResponse;
    import com.marketpulse.identity.service.ApiKeyService;
    import jakarta.validation.Valid;
    import org.springframework.http.HttpStatus;
    import org.springframework.web.bind.annotation.*;

    import java.util.List;
    import java.util.UUID;

    @RestController
    public class KeyController {

        private final ApiKeyService apiKeyService;

        public KeyController(ApiKeyService apiKeyService) {
            this.apiKeyService = apiKeyService;
        }

        @PostMapping("/api/v1/keys")
        public CreateKeyResponse createKey(
                @RequestHeader("X-Tenant-Id") UUID tenantId,
                @Valid @RequestBody CreateKeyRequest request
        ) {
            return apiKeyService.issue(tenantId, request.label());
        }

        @GetMapping("/api/v1/keys")
        public List<KeySummaryResponse> listKeys(
                @RequestHeader("X-Tenant-Id") UUID tenantId
        ) {
            return apiKeyService.listByTenant(tenantId);
        }

        @DeleteMapping("/api/v1/keys/{id}")
        @ResponseStatus(HttpStatus.NO_CONTENT)
        public void deleteKey(
                @RequestHeader("X-Tenant-Id") UUID tenantId,
                @PathVariable UUID id
        ) {
            apiKeyService.revoke(tenantId, id);
        }
    }
- type: prose
  content: 'Năm **DTO** (Data Transfer Object — bản ghi vào/ra API, tách khỏi entity DB). Dùng Java record cho gọn. `CreateKeyResponse` là DTO duy nhất chứa trường `key` (raw) — nó chỉ được trả một lần lúc tạo:'
