- type: prose
  content: 'Cuối cùng là **xử lý lỗi tập trung**. Thay vì mỗi controller tự bắt exception, `@RestControllerAdvice` gom về một chỗ: key không thấy → 404 `KEY_NOT_FOUND`, body sai định dạng → 400. Client luôn nhận JSON lỗi gọn gàng thay vì stacktrace 500.'
