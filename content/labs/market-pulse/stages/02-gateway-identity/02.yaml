- type: prose
  content: Ba **repository** (Spring Data JPA — tự sinh câu SQL từ tên method). Đáng chú ý `findActiveByKeyHash` dùng `JOIN FETCH` để lấy luôn tenant + plan trong MỘT truy vấn — tránh bẫy *N+1 query* (lười nạp rồi query thêm từng dòng). Query này chính là cái gateway sẽ gọi.
