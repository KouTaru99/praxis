    package com.marketpulse.identity.util;

    import org.junit.jupiter.api.Test;

    import static org.assertj.core.api.Assertions.assertThat;

    class Sha256Test {

        // echo -n "demo-key-acme-2026" | sha256sum
        private static final String KNOWN_HASH =
                "c353b1e8e03220dea4afd70dc01590685b711e4aab502b61a9c9d277cd459826";

        @Test
        void hex_knownInput_matchesSeedHash() {
            assertThat(Sha256.hex("demo-key-acme-2026")).isEqualTo(KNOWN_HASH);
        }

        @Test
        void hex_sameInput_isDeterministic() {
            String h1 = Sha256.hex("any-string");
            String h2 = Sha256.hex("any-string");
            assertThat(h1).isEqualTo(h2).hasSize(64);
        }

        @Test
        void hex_differentInputs_produceDifferentHashes() {
            assertThat(Sha256.hex("key-a")).isNotEqualTo(Sha256.hex("key-b"));
        }
    }
