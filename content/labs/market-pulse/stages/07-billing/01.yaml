- type: callout
  variant: info
  content: Câu query `findByIdWithPlan` dùng `JOIN FETCH` để lấy `Tenant` kèm `Plan` trong một lần truy vấn duy nhất — cùng kỹ thuật, cùng lý do (tránh N+1 query) như `ApiKeyRepository.findActiveByKeyHash` ở Chặng 2. Một khi học một mẫu, mẫu đó lặp lại tự nhiên ở chỗ cần.
