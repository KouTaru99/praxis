id: bi-06
title: 'billing: 2 endpoint — nội bộ cho rule-engine, công khai cho tenant'
order: 6
est_minutes: 25
commit_ref: a1b4924
goal: Mở GET /internal/quota (rule-engine gọi lúc tạo rule) và GET /api/v1/usage (tenant tự xem lượng dùng của mình).
deliverable: InternalQuotaController + UsageController + QuotaStatusResponse + UsageResponse.
outcome_preview: Sau bước này, rule-engine có nơi để hỏi "tenant này còn hạn mức không", và tenant (qua dashboard Chặng 8 sau này) có nơi để tự xem mình đã dùng bao nhiêu.
blocks:
- type: prose
  content: 'Endpoint nội bộ trả lời đúng câu hỏi rule-engine cần — nhận `activeRules` do rule-engine tự đếm truyền vào (bước 7.2), trả về cả hai loại hạn mức (rule và alert) trong một lần gọi:'
- type: code
  filename: billing/src/main/java/com/marketpulse/billing/controller/InternalQuotaController.java
  lang: java
  content: |
    package com.marketpulse.billing.controller;

    import com.marketpulse.billing.client.TenantPlan;
    import com.marketpulse.billing.dto.QuotaStatusResponse;
    import com.marketpulse.billing.service.UsageService;
    import org.springframework.web.bind.annotation.GetMapping;
    import org.springframework.web.bind.annotation.PathVariable;
    import org.springframework.web.bind.annotation.RequestParam;
    import org.springframework.web.bind.annotation.RestController;

    import java.util.Optional;
    import java.util.UUID;

    @RestController
    public class InternalQuotaController {

        private final UsageService usageService;

        public InternalQuotaController(UsageService usageService) {
            this.usageService = usageService;
        }

        // Chỉ dùng nội bộ Docker network — rule-engine gọi khi tạo rule (ADR-003, rule quota sync).
        // activeRules: rule-engine tự đếm rồi truyền vào (billing không sở hữu bảng rules).
        @GetMapping("/internal/quota/{tenantId}")
        public QuotaStatusResponse getQuota(@PathVariable UUID tenantId, @RequestParam int activeRules) {
            int alertsThisMonth = usageService.alertsFiredInCurrentPeriod(tenantId);
            Optional<TenantPlan> planOpt = usageService.planFor(tenantId);

            if (planOpt.isEmpty()) {
                // identity không phản hồi: fail-open — không exceed, rule-engine (cũng fail-open) tự quyết tiếp
                return new QuotaStatusResponse(activeRules, 0, alertsThisMonth, 0, false, false);
            }

            TenantPlan plan = planOpt.get();
            boolean rulesExceeded = activeRules >= plan.maxRules();
            boolean alertsExceeded = alertsThisMonth > plan.maxAlertsPm();
            return new QuotaStatusResponse(
                    activeRules, plan.maxRules(), alertsThisMonth, plan.maxAlertsPm(),
                    rulesExceeded, alertsExceeded);
        }
    }
- type: code
  filename: billing/src/main/java/com/marketpulse/billing/dto/QuotaStatusResponse.java
