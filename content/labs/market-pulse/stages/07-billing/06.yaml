    package com.marketpulse.billing.dto;

    /** Field name phải khớp CHÍNH XÁC rule-engine.client.QuotaStatus — rule-engine deserialize theo tên JSON. */
    public record QuotaStatusResponse(
            int activeRules, int maxRules,
            int alertsThisMonth, int maxAlertsPerMonth,
            boolean rulesQuotaExceeded, boolean alertsQuotaExceeded
