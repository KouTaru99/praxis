- type: callout
  variant: warning
  content: 'Chú thích ngay trong code nhắc một ràng buộc dễ quên: tên field của `QuotaStatusResponse` (billing) phải khớp CHÍNH XÁC với `QuotaStatus` (rule-engine tự khai riêng, Chặng 5) — vì hai service không share chung một module DTO cho cặp gọi này. Đây là đánh đổi đơn giản-hoá có chủ đích cho quy mô lab: đủ nhỏ để tự kỷ luật giữ khớp tay, nhưng ở một hệ lớn hơn, lệch tên field một bên sẽ âm thầm gãy mà không có gì báo lỗi lúc build (JSON field không khớp → Jackson gán giá trị mặc định thay vì lỗi rõ ràng).'
