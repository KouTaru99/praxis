id: bi-03
title: 'billing: scaffold + schema usage_periods + RabbitMQ topology'
order: 3
est_minutes: 30
commit_ref: f804597
goal: 'Khởi tạo service billing: dependencies, cấu hình port 8085, bảng usage_periods, và đăng ký với 2 exchange (nghe alerts, phát quota).'
deliverable: build.gradle.kts + application.yml + V1__init.sql (usage_periods) + RabbitConfig (queue billing.alerts + khai lại quota exchange).
outcome_preview: Sau bước này, billing có chỗ lưu lượng dùng theo tháng, và đã đăng ký đúng vị trí trong hệ RabbitMQ để vừa nghe vừa nói.
blocks:
- type: prose
  content: 'Bảng `usage_periods` thiết kế đơn giản có chủ đích — mỗi dòng là một cặp (tenant, tháng):'
- type: code
  filename: billing/src/main/resources/db/migration/V1__init.sql
  lang: sql
  content: |
    -- period dạng 'YYYY-MM' — cùng tenant + period là 1 dòng duy nhất; sang tháng mới,
    -- chưa có dòng nào cho period đó = usage coi như 0 (reset đầu kỳ "miễn phí", không cần job dọn).
    CREATE TABLE usage_periods (
      id           UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
      tenant_id    UUID        NOT NULL,
      period       VARCHAR(7)  NOT NULL,
      alerts_fired INT         NOT NULL DEFAULT 0,
      updated_at   TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE UNIQUE INDEX idx_usage_tenant_period ON usage_periods(tenant_id, period);
- type: callout
  variant: info
  content: '`period` dạng `''YYYY-MM''` nghĩa là sang tháng mới, CHƯA có dòng nào cho tháng đó — usage coi như 0 một cách tự nhiên, không cần một job dọn dẹp hay reset thủ công nào cả. Đây là một mẹo mô hình hoá dữ liệu quen thuộc: biến "reset định kỳ" thành "chưa tồn tại" thay vì phải chủ động xoá/sửa.'
