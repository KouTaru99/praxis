- type: prose
  content: '`RabbitConfig` của billing đứng ở CẢ HAI đầu hàng đợi: nó **nghe** exchange `market-pulse.alerts` (rule-engine khai gốc ở Chặng 5, alert-delivery cũng nghe cùng exchange ở Chặng 6) qua một queue RIÊNG của billing, và nó **phát** vào exchange `market-pulse.quota` mà rule-engine đã tự bind sẵn (Chặng 5) để tạm dừng đánh giá khi cần.'
- type: code
  filename: billing/src/main/java/com/marketpulse/billing/config/RabbitConfig.java
  lang: java
  content: |
    package com.marketpulse.billing.config;

    import org.springframework.amqp.core.*;
    import org.springframework.amqp.support.converter.DefaultJackson2JavaTypeMapper;
    import org.springframework.amqp.support.converter.Jackson2JsonMessageConverter;
    import org.springframework.context.annotation.Bean;
    import org.springframework.context.annotation.Configuration;

    @Configuration
    public class RabbitConfig {

        // exchange alerts: rule-engine khai gốc (Chặng 5) — billing khai lại idempotent (cùng thuộc
        // tính) chỉ để mở queue RIÊNG của mình. billing + alert-delivery là 2 consumer ĐỘC LẬP của
        // cùng 1 exchange/routing-key: mỗi bên có queue riêng nên đều nhận đủ mọi alert, không tranh nhau.
        public static final String ALERTS_EXCHANGE = "market-pulse.alerts";
        public static final String ALERTS_QUEUE = "billing.alerts";
        public static final String ALERTS_ROUTING_KEY = "alert";

        // exchange quota: rule-engine khai gốc (Chặng 5) để tự bind queue nghe; billing chỉ PUBLISH
        // nên không cần khai queue, chỉ cần khai lại exchange (idempotent) để gửi vào.
        public static final String QUOTA_EXCHANGE = "market-pulse.quota";
        public static final String QUOTA_ROUTING_KEY = "quota.exceeded";

        @Bean
        public DirectExchange alertsExchange() {
            return new DirectExchange(ALERTS_EXCHANGE, true, false);
        }

        @Bean
        public Queue alertsQueue() {
            return new Queue(ALERTS_QUEUE, true);
        }

        @Bean
        public Binding alertsBinding(Queue alertsQueue, DirectExchange alertsExchange) {
            return BindingBuilder.bind(alertsQueue).to(alertsExchange).with(ALERTS_ROUTING_KEY);
        }

        @Bean
        public DirectExchange quotaExchange() {
            return new DirectExchange(QUOTA_EXCHANGE, true, false);
        }

        @Bean
        public Jackson2JsonMessageConverter jackson2JsonMessageConverter() {
            DefaultJackson2JavaTypeMapper typeMapper = new DefaultJackson2JavaTypeMapper();
            typeMapper.setTrustedPackages("com.marketpulse.*");
            Jackson2JsonMessageConverter converter = new Jackson2JsonMessageConverter();
            converter.setClassMapper(typeMapper);
            return converter;
        }
    }
- type: callout
  variant: info
  content: 'billing và alert-delivery là **hai consumer độc lập của cùng một exchange/routing-key** — mỗi bên có queue riêng (`billing.alerts` và `alert-delivery.alerts`) nên cả hai đều nhận được BẢN SAO đầy đủ của mọi alert, không tranh giành nhau. Đây là cách publish/subscribe đúng nghĩa qua exchange kiểu `direct`/`fanout`: nhiều consumer, mỗi consumer thấy toàn bộ luồng theo góc nhìn riêng của mình.'
