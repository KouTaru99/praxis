- type: callout
  variant: warning
  content: '**Vì sao `ArrayDeque` cần `synchronized` thủ công, trong khi `CandleAggregator` (Chặng 4) chỉ cần `ConcurrentHashMap.compute`?** `ConcurrentHashMap` tự đảm bảo an toàn đa luồng cho THAO TÁC TRÊN MAP (get/put/compute), nhưng `ArrayDeque` bên trong mỗi giá trị hoàn toàn KHÔNG an toàn đa luồng — 2 thread cùng `addLast()` vào 1 deque có thể làm hỏng cấu trúc dữ liệu nội bộ. `computeIfAbsent` chỉ bảo vệ việc "tạo deque nếu chưa có"; mọi thao tác SAU đó lên chính deque đó (add, pollFirst, đọc) phải tự khoá — đây là lỗi rất dễ mắc: tưởng dùng `ConcurrentHashMap` là "xong", nhưng an toàn đa luồng phải xét tới TỪNG thao tác, không chỉ tầng ngoài cùng.'
