- type: code
  filename: rule-engine/src/main/java/com/marketpulse/ruleengine/store/RollingCandleStore.java
  lang: java
  content: |
    @Component
    public class RollingCandleStore {

        private static final int MAX_CANDLES = 60;

        // symbol → deque (oldest ở đầu, newest ở cuối); synchronized trên deque instance
        private final ConcurrentHashMap<String, ArrayDeque<Candle1mEvent>> store = new ConcurrentHashMap<>();

        public void add(Candle1mEvent candle) {
            ArrayDeque<Candle1mEvent> deque = store.computeIfAbsent(
                    candle.symbol(), k -> new ArrayDeque<>(MAX_CANDLES + 1));
            synchronized (deque) {
                deque.addLast(candle);
                if (deque.size() > MAX_CANDLES) {
                    deque.pollFirst();
                }
            }
        }

        /** Trả bản sao danh sách nến theo thứ tự cũ→mới (openTime tăng dần). */
        public List<Candle1mEvent> recent(String symbol) {
            ArrayDeque<Candle1mEvent> deque = store.get(symbol);
            if (deque == null) return List.of();
            synchronized (deque) {
                return new ArrayList<>(deque);
            }
        }
    }
