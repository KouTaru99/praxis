  lang: java
  content: |
    @RestController
    @RequestMapping("/api/v1/rules")
    public class RuleController {

        private final RuleService ruleService;

        @PostMapping
        public RuleResponse create(@RequestHeader("X-Tenant-Id") UUID tenantId,
                                    @Valid @RequestBody CreateRuleRequest request) {
            return ruleService.create(tenantId, request);
        }

        @GetMapping
        public List<RuleResponse> list(@RequestHeader("X-Tenant-Id") UUID tenantId) {
            return ruleService.listByTenant(tenantId);
        }

        @DeleteMapping("/{id}")
        @ResponseStatus(HttpStatus.NO_CONTENT)
        public void delete(@RequestHeader("X-Tenant-Id") UUID tenantId, @PathVariable UUID id) {
            ruleService.delete(tenantId, id);
        }
    }

    // GlobalExceptionHandler map: InvalidSymbol/InvalidParams → 400,
    // QuotaExceeded → 402 Payment Required, RuleNotFound → 404
- type: prose
  content: '5 test kiểm đúng những nhánh khó thấy nhất — đặc biệt `create_quotaClientThrows_failOpenAndSavesRule`, bài kiểm trực tiếp cho quyết định fail-open:'
- type: code
  filename: rule-engine/src/test/java/com/marketpulse/ruleengine/service/RuleServiceTest.java (trích)
  lang: java
  content: |
    @Test
    void create_quotaClientThrows_failOpenAndSavesRule() {
        when(quotaClient.check(TENANT_ID)).thenThrow(new RuntimeException("Connection refused"));
        when(ruleRepository.save(any(Rule.class))).thenAnswer(inv -> inv.getArgument(0));

        RuleResponse resp = ruleService.create(TENANT_ID, req);   // KHÔNG ném lỗi

        assertThat(resp).isNotNull();
        verify(ruleRepository).save(any(Rule.class));   // rule vẫn được lưu
    }

    @Test
    void create_quotaExceeded_throws402() {
        QuotaStatus exceeded = new QuotaStatus(5, 5, 0, 100, true, false);
        when(quotaClient.check(TENANT_ID)).thenReturn(Optional.of(exceeded));

        assertThatThrownBy(() -> ruleService.create(TENANT_ID, req))
                .isInstanceOf(QuotaExceededException.class);   // billing CÓ trả lời và nói "vượt" → chặn thật
    }
- type: callout
  variant: warning
  content: '**Fail-open có đánh đổi thật, không phải "miễn phí".** Nếu `billing` sập kéo dài, tenant có thể tạo rule vượt hạn mức gói cước — về mặt kinh doanh, đây là rủi ro mất doanh thu tạm thời. Nhưng đánh đổi ngược lại (fail-closed) tệ hơn nhiều: `billing` sập 5 phút thì MỌI tenant không tạo được rule nào — một service phụ trợ (billing) làm sập tính năng lõi (rule-engine). Nguyên tắc chung: **fail-open cho tính năng phụ trợ khi hạ tầng phụ trợ đó lỗi, fail-closed cho chính sách bảo mật/toàn vẹn dữ liệu.** Quota là chính sách kinh doanh, không phải toàn vẹn dữ liệu — fail-open hợp lý ở đây.'
