goal: 'Viết API tạo/xem/xóa rule cho tenant, với validate tham số theo từng loại rule, và một quyết định thiết kế quan trọng: gọi billing kiểm quota nhưng KHÔNG chặn nếu billing không phản hồi.'
deliverable: RuleController (3 endpoint) + RuleService + QuotaClient (fail-open) + 5 exception + 5 unit test.
outcome_preview: 'POST /api/v1/rules tạo được rule ngay từ bây giờ — dù billing (kiểm quota thật) chỉ ra đời ở Chặng 7.'
blocks:
- type: prose
  content: |
    Đây là bước quan trọng nhất về mặt **tư duy thiết kế hệ phân tán** trong cả lab: `rule-engine` PHẢI gọi sang `billing` để biết tenant còn hạn mức tạo rule không — nhưng `billing` chưa được xây (Chặng 7). Vậy phát triển Chặng 5 có bị chặn lại chờ Chặng 7 xong không?

    Câu trả lời là **fail-open**: nếu gọi `billing` thất bại (timeout, connection refused, hay đơn giản là chưa tồn tại), `rule-engine` coi như "không có thông tin quota, cứ cho phép" — thay vì fail-closed ("không chắc thì từ chối"). Đây là quyết định có chủ đích, không phải sơ suất — callout cuối bước giải thích vì sao.
- type: code
  filename: rule-engine/src/main/java/com/marketpulse/ruleengine/client/QuotaClient.java
  lang: java
  content: |
    @Component
    public class QuotaClient {

        private final WebClient webClient;

        public QuotaClient(WebClient.Builder builder, @Value("${billing.service.url}") String baseUrl) {
            this.webClient = builder.baseUrl(baseUrl).build();
        }

        /**
         * Trả empty nếu billing chưa phản hồi (timeout / connection refused).
         * Service xử lý fail-open: empty → cho phép tạo rule.
         */
        public Optional<QuotaStatus> check(UUID tenantId) {
            return webClient.get()
                    .uri("/internal/quota/{tenantId}", tenantId)
                    .retrieve()
                    .bodyToMono(QuotaStatus.class)
                    .timeout(Duration.ofSeconds(2))
                    .blockOptional();
        }
    }

    // QuotaStatus.java — record khớp response tương lai của billing (Chặng 7)
    public record QuotaStatus(
            int activeRules, int maxRules,
            int alertsThisMonth, int maxAlertsPerMonth,
            boolean rulesQuotaExceeded, boolean alertsQuotaExceeded
    ) {}
- type: prose
  content: '`RuleService` gói toàn bộ nghiệp vụ: validate symbol + tham số theo loại rule (mỗi loại cần tham số khác nhau — khai trong 1 `Map` tĩnh, không if/else dài dòng), gọi quota, rồi lưu:'
- type: code
  filename: rule-engine/src/main/java/com/marketpulse/ruleengine/service/RuleService.java
  lang: java
  content: |
    @Service
    @Transactional
    public class RuleService {

        private static final Set<String> VALID_TYPES = Set.of(
                "PRICE_THRESHOLD", "PERCENT_CHANGE", "VOLUME_SPIKE");

        private static final Map<String, Set<String>> REQUIRED_PARAMS = Map.of(
                "PRICE_THRESHOLD", Set.of("threshold", "direction"),
                "PERCENT_CHANGE",  Set.of("percent", "windowMinutes", "direction"),
                "VOLUME_SPIKE",    Set.of("multiplier")
        );

        // ... constructor(ruleRepository, quotaClient) ...

        public RuleResponse create(UUID tenantId, CreateRuleRequest req) {
            validateSymbol(req.symbol());
            validateTypeAndParams(req.type(), req.params());
            checkQuota(tenantId);

            Rule rule = new Rule(tenantId, req.symbol(), req.type(), req.params(), req.webhookUrl());
            Rule saved = ruleRepository.save(rule);
            // TODO: refresh RuleStore — bước 5.4
            return toResponse(saved);
        }

        private void validateTypeAndParams(String type, Map<String, Object> params) {
            if (!VALID_TYPES.contains(type)) throw new InvalidParamsException();
            Set<String> required = REQUIRED_PARAMS.get(type);
            if (params == null || !params.keySet().containsAll(required)) {
                throw new InvalidParamsException();
            }
        }

        private void checkQuota(UUID tenantId) {
            try {
                Optional<QuotaStatus> quota = quotaClient.check(tenantId);
                if (quota.isPresent() && quota.get().rulesQuotaExceeded()) {
                    long current = ruleRepository.countByTenantIdAndStatus(tenantId, "ACTIVE");
                    throw new QuotaExceededException(quota.get().maxRules(), (int) current);
                }
            } catch (QuotaExceededException e) {
                throw e;   // đây là lỗi NGHIỆP VỤ thật — phải ném tiếp
            } catch (Exception e) {
                log.warn("billing unavailable, skipping quota check: {}", e.getMessage());
                // nuốt lỗi HẠ TẦNG có chủ đích — đây chính là fail-open
            }
        }
    }
