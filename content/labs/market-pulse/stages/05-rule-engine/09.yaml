- type: prose
  content: |
    **Chặng 3-5 khép lại Phần B — luồng dữ liệu thời gian thực trọn vẹn:** Binance thật → trade chuẩn hoá → nến 1 phút → rule tự tạo → cảnh báo tự động. Ba service (`market-feed`, `aggregation`, `rule-engine`) không service nào biết chi tiết nội bộ của service kia — chỉ biết "hợp đồng" qua RabbitMQ. Đây chính là kiến trúc message-driven microservices đúng nghĩa, không phải chỉ là "chia code ra nhiều thư mục".

    Phần C (Chặng 6-7: alert-delivery gửi webhook thật + billing tính quota thật) sẽ khép 2 khoảng trống đang để ngỏ: alert hiện mới dừng ở RabbitMQ (chưa ai gửi đi), và quota hiện luôn fail-open (chưa ai từ chối).
