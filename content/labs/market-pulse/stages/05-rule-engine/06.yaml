  content: |
    // PercentChangeEvaluatorTest
    @Test
    void insufficientCandles_returnsEmpty() {
        // window=5, chỉ có 5 nến → cần 6
        List<Candle1mEvent> c = candles(5, "100", "100", "100", "100", "105");
        assertThat(evaluator.evaluate(rule("3", 5, "UP"), c)).isEmpty();
    }

    @Test
    void pastCloseZero_returnsEmpty() {
        // chia cho 0 phải trả rỗng, KHÔNG ném ArithmeticException
        List<Candle1mEvent> c = candles(6, "0", "0", "0", "0", "0", "100");
        assertThat(evaluator.evaluate(rule("5", 5, "UP"), c)).isEmpty();
    }

    // VolumeSpikeEvaluatorTest
    @Test
    void currentVolumeExceedsMultiplierBaseline_triggers() {
        // baseline avg = (10+10+10)/3 = 10; current = 50 ≥ 3×10=30
        List<Candle1mEvent> candles = List.of(candle("10"), candle("10"), candle("10"), candle("50"));
        assertThat(evaluator.evaluate(rule("3"), candles)).isPresent();
    }
- type: callout
  variant: warning
  content: '**`pastCloseZero_returnsEmpty` không phải test thừa cho một tình huống "không thể xảy ra".** Nến chưa từng có giao dịch nào (`tradeCount=0`) về lý thuyết không nên tồn tại theo cách `CandleAggregator` (Chặng 4) hoạt động — nhưng dữ liệu thị trường thật đôi khi có nến giá 0 do lỗi nguồn hoặc symbol mới niêm yết chưa đủ thanh khoản. Chia cho 0 trong Java với `BigDecimal` ném `ArithmeticException` — nếu không kiểm trước, MỘT nến bất thường sẽ làm sập toàn bộ vòng đánh giá cho symbol đó, ảnh hưởng tới MỌI rule khác đang chờ nến kế tiếp.'
