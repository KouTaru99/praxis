- type: prose
  content: 'Bug thật gặp lúc verify smoke-test (kể ở đây đúng như đã xảy ra): response `POST /api/v1/rules` trả `createdAt: null`, dù cột DB có `DEFAULT NOW()` và entity có `@CreationTimestamp`. Nguyên nhân: Hibernate CHỈ set `@CreationTimestamp` lúc thật sự `flush()` (đẩy SQL xuống DB) — mà theo mặc định, `save()` trong 1 transaction có thể hoãn flush tới cuối transaction, sau khi `RuleService` đã đọc `saved.getCreatedAt()` để build response:'
- type: code
  filename: rule-engine/src/main/java/com/marketpulse/ruleengine/service/RuleService.java (sửa 1 dòng)
  lang: java
  content: |
    Rule rule = new Rule(tenantId, req.symbol(), req.type(), req.params(), req.webhookUrl());
    // saveAndFlush: @CreationTimestamp chỉ set khi flush → cần flush để response có createdAt (không null)
    Rule saved = ruleRepository.saveAndFlush(rule);
    ruleStore.upsert(saved);
    return toResponse(saved);
- type: callout
  variant: warning
  content: '**`save()` vs `saveAndFlush()` — khác biệt tưởng nhỏ, hậu quả thấy ngay ở response API.** `save()` đưa entity vào "persistence context" của Hibernate nhưng KHÔNG bắt buộc chạy SQL ngay — Hibernate tối ưu bằng cách gom nhiều thay đổi rồi flush 1 lần cuối transaction. Với hầu hết trường hợp điều này vô hại. Nhưng khi code đọc lại giá trị DO DATABASE SINH RA (như `@CreationTimestamp`, hay `SERIAL` id trong vài cấu hình) để trả về NGAY trong cùng request — phải `saveAndFlush()` để chắc chắn giá trị đó đã tồn tại. Đây là loại bug chỉ lộ ra khi TEST THẬT qua HTTP (đọc response JSON), không lộ qua unit test dùng mock repository (bước 5.3 mock `save()` trả thẳng object truyền vào, nên `createdAt` "có vẻ" đúng dù logic thật đang sai).'
