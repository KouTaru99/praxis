blocks:
- type: prose
  content: 'Dockerfile theo khuôn đã ổn định từ Chặng 3-4, không có gì mới. Điểm đáng chú ý nằm ở 2 thay đổi còn lại của bước này.'
- type: code
  filename: rule-engine/Dockerfile (khuôn quen thuộc)
  lang: dockerfile
  content: |
    FROM eclipse-temurin:21-jdk AS builder
    # ... COPY gradlew, gradle/, build.gradle.kts của mọi subproject ...
    COPY common/src      common/src
    COPY rule-engine/src rule-engine/src
    RUN --mount=type=cache,target=/root/.gradle chmod +x gradlew && ./gradlew :rule-engine:bootJar --no-daemon -x test

    FROM eclipse-temurin:21-jre-alpine
    RUN addgroup -S appgroup && adduser -S appuser -G appgroup
    WORKDIR /app
    COPY --from=builder /workspace/rule-engine/build/libs/rule-engine.jar app.jar
    USER appuser
    EXPOSE 8083
    ENTRYPOINT ["java", "-Xmx256m", "-jar", "app.jar"]
