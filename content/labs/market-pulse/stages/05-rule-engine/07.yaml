- type: prose
  content: |
    Mọi mảnh trước đó (RuleStore, RollingCandleStore, 3 evaluator) giờ ráp lại thành 2 consumer: `TradeConsumer` (nghe `market-pulse.trades`, chỉ chạy `PriceThresholdEvaluator`) và `CandleConsumer` (nghe `market-pulse.candles`, chạy `PercentChangeEvaluator` + `VolumeSpikeEvaluator`).

    Nhưng ráp thẳng "khớp → bắn alert ngay" sẽ tạo ra vấn đề: một rule `BELOW 50000` khi giá đang ở 49000 sẽ khớp **mỗi trade tiếp theo** — với market-feed nhận vài chục trade/giây, đó là spam alert không kiểm soát được. Cần `AlertCooldown`.
- type: code
  filename: rule-engine/src/main/java/com/marketpulse/ruleengine/alert/AlertCooldown.java
  lang: java
  content: |
    /**
     * Chống spam alert: sau khi một rule fire, chặn fire lại trong cooldown-ms.
     * compute() của ConcurrentHashMap đảm bảo atomic read-then-write → không double-fire.
     */
    @Component
    public class AlertCooldown {

        @Value("${rule-engine.alert.cooldown-ms:60000}")
        private long cooldownMs;

        private final ConcurrentHashMap<UUID, Long> lastFired = new ConcurrentHashMap<>();

        public boolean shouldFire(UUID ruleId, long nowMs) {
            boolean[] fired = {false};
            lastFired.compute(ruleId, (k, last) -> {
                if (last == null || nowMs - last >= cooldownMs) {
                    fired[0] = true;
                    return nowMs;
                }
                return last;   // vẫn trong cooldown — giữ nguyên mốc cũ
            });
            return fired[0];
        }
    }
- type: code
  filename: rule-engine/src/main/java/com/marketpulse/ruleengine/consumer/TradeConsumer.java + CandleConsumer.java
