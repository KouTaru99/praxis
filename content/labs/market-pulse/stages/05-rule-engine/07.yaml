  lang: java
  content: |
    @Component
    public class AlertPublisher {

        private final RabbitTemplate rabbitTemplate;

        public void publish(Rule rule, String triggerValue) {
            AlertTriggeredEvent event = new AlertTriggeredEvent(
                    UUID.randomUUID().toString(), rule.getId().toString(), rule.getTenantId().toString(),
                    rule.getSymbol(), rule.getRuleType(),
                    OffsetDateTime.now(ZoneOffset.UTC).toString(),
                    triggerValue, rule.getWebhookUrl()
            );
            rabbitTemplate.convertAndSend(RabbitConfig.ALERTS_EXCHANGE, RabbitConfig.ALERTS_ROUTING_KEY, event);
            log.info("Alert triggered: rule={} symbol={} value={}", rule.getId(), rule.getSymbol(), triggerValue);
        }
    }
- type: prose
  content: 'Mảnh cuối: `QuotaConsumer` — khi `billing` (Chặng 7) phát hiện tenant vượt hạn mức, nó sẽ publish `QuotaExceededEvent` vào `market-pulse.quota`. `rule-engine` nghe sự kiện này, chuyển mọi rule ACTIVE của tenant đó sang `EVAL_PAUSED` (cả DB lẫn bộ nhớ):'
- type: code
  filename: rule-engine/src/main/java/com/marketpulse/ruleengine/consumer/QuotaConsumer.java
  lang: java
  content: |
    @Component
    public class QuotaConsumer {

        @RabbitListener(queues = RabbitConfig.QUOTA_QUEUE)
        @Transactional
        public void onQuotaExceeded(QuotaExceededEvent event) {
            UUID tenantId = UUID.fromString(event.tenantId());
            log.warn("Quota exceeded: tenant={} type={} current={} limit={}",
                    tenantId, event.quotaType(), event.currentCount(), event.limit());

            ruleRepository.findByTenantIdAndStatusNot(tenantId, "DELETED").stream()
                    .filter(r -> "ACTIVE".equals(r.getStatus()))
                    .forEach(r -> { r.markEvalPaused(); ruleRepository.save(r); });

            ruleStore.pauseByTenant(tenantId);   // dừng đánh giá NGAY, không đợi DB round-trip lần sau
        }
    }
- type: callout
  variant: info
  content: '**`QuotaConsumer` hoạt động bình thường dù chưa có ai publish vào `market-pulse.quota` — đó chính là điểm hay của kiến trúc message-driven.** Chặng 5 declare consumer sẵn sàng nghe; Chặng 7 (billing) chỉ cần publish đúng `QuotaExceededEvent` vào đúng exchange, không cần biết `rule-engine` xử lý message đó thế nào, cũng không cần `rule-engine` deploy lại.'
- type: callout
  variant: warning
  content: '**Vì sao `ruleStore.pauseByTenant()` bên cạnh việc lưu DB — không phải chỉ 1 trong 2?** Lưu DB đảm bảo trạng thái sống sót qua restart (nguồn sự thật lâu dài). Nhưng `RuleStore` trong bộ nhớ là bản sao đang dùng THẬT SỰ để đánh giá mỗi trade — nếu chỉ lưu DB mà không cập nhật bộ nhớ, rule của tenant đã vượt quota vẫn tiếp tục được đánh giá (và bắn alert) cho tới lần restart tiếp theo. Hai bước, hai vai trò khác nhau: DB = bền vững, RuleStore = tốc độ.'
