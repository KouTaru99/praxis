blocks:
- type: prose
  content: |
    Chào mừng đến với Lab **Market Pulse** — lab lớn thứ hai của Praxis, và là một bậc nhảy so với Mini-Wiki: bạn sẽ xây một nền tảng B2B **cảnh báo thị trường real-time** chạy trên dòng dữ liệu THẬT từ Binance (sàn giao dịch crypto — WebSocket công khai, không cần tài khoản, khoảng 80 giao dịch/giây chỉ riêng cặp BTCUSDT).

    Nghiệp vụ: khách hàng B2B (gọi là **tenant** — mỗi khách một "ngăn" riêng trên hệ thống) đặt **rule** kiểu "báo tôi khi giá BTC vượt 100.000". Hệ thống canh dòng giao dịch 24/7, khớp rule, bắn **alert** qua webhook, và tính cước theo mức dùng. Kiến trúc là **microservices ngay từ đầu**: 7 service Spring Boot nói chuyện qua hàng đợi RabbitMQ, mỗi service một database PostgreSQL riêng (db-per-service).
