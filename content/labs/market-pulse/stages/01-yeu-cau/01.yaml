- type: prose
  content: 'Giờ tới phần cốt lõi: `docs/requirements.md`. Tài liệu đi từ **vấn đề** (vì sao doanh nghiệp cần canh thị trường tự động) → **goals / non-goals** (làm gì và cố tình KHÔNG làm gì) → **user stories** theo góc nhìn tenant → **R01–R07**: yêu cầu chi tiết cho từng service, kèm **acceptance criteria** (tiêu chí nghiệm thu — kịch bản chạy được để chứng minh hệ đạt yêu cầu) cho luồng end-to-end, retry webhook, vượt quota, chạy từng profile và chế độ replay.'
- type: code
  filename: docs/requirements.md
  lang: markdown
  content: "# Market Pulse — Product Requirements\n\n> **Phạm vi tài liệu này:** Yêu cầu sản phẩm Market Pulse (nền tảng B2B cảnh báo thị trường).  \n> Yêu cầu nền tảng Lab (Praxis) không nằm ở đây.\n\n---\n\n## 1. Vấn đề cần giải quyết\n\nDoanh nghiệp cần theo dõi biến động giá/volume trên thị trường tiền mã hoá. Giải pháp hiện tại là polling định kỳ hoặc xây custom script — tốn chi phí vận hành, dễ sót sự kiện, không scale.\n\n**Market Pulse** cung cấp hạ tầng cảnh báo real-time theo mô hình B2B:\n- Tenant đăng ký rule theo symbol + điều kiện.\n- Khi điều kiện khớp với dữ liệu live (~80 trades/giây từ Binance), hệ tự động gửi webhook.\n- Tenant không cần viết code polling, không cần quản lý kết nối WS, không cần lo retry khi delivery thất bại.\n\n**Chi phí nếu không có:** tự xây = tốn kỹ sư, khó maintain, miss nhiều edge case (reconnect WS, retry webhook, quota enforcement).\n\n---\n\n## 2. Goals\n\n| # | Outcome | Đo bằng |\n|---|---------|---------|\n| G1 | Hệ nhận dữ liệu Binance thật và xử lý real-time | `docker compose --profile full up` → 7 JVM + DB + RabbitMQ healthy; log trade Binance đầu tiên trong 10 giây |\n| G2 | Tenant tự quản lý rule và theo dõi alert không cần gọi API thủ công | Luồng tạo rule → alert trigger → webhook DELIVERED hoàn chỉnh trong Dashboard |\n| G3 | Hệ vận hành đúng quota — vượt hạn mức thì chặn rõ ràng, không drop silently | Rule thứ (limit+1) → HTTP 402; alert quota vượt → eval pause, không mất alert |\n| G4 | Webhook delivery tin cậy — fail tự retry, có audit trail đầy đủ | Retry 3 lần (1s → 4s → 16s); history đủ attempted_at + status_code + status |\n| G5 | Hệ phân tách module rõ ràng, mỗi service độc lập DB riêng | Không service nào query DB của service khác; giao tiếp chỉ qua REST internal + RabbitMQ |\n\n---\n\n## 3. Non-Goals\n\n| Điều không làm | Lý do |\n|---------------|-------|\n| Thanh toán thật (cổng payment) | Billing chỉ cần đếm usage + quota + xuất thông tin; không tích hợp PSP |\n| Multi-region / HA / Kubernetes | Nằm ngoài phạm vi nhập môn; ghi nhận để phát triển sau |\n| SMS delivery | Webhook + email giả lập đủ minh hoạ delivery pipeline; SMS tăng chi phí API |\n| Rule phức tạp (AND/OR, RSI/MACD, chỉ báo kỹ thuật) | v1 chỉ cần 3 loại rule; rule phức tạp là lab kế thừa |\n| Nguồn dữ liệu bổ sung (BrandWatch, Wikipedia) | Adapter tách bạch trong `market-feed` để sau thay Binance không đập lõi — nhưng implementation để sau |\n\n---\n\n## 4. User Stories (Persona B — Tenant B2B)\n\n### Rule management\n\n- **B1 (P0):** Là tenant B2B, muốn tạo alert rule (price threshold / % change / volume spike) cho symbol quan tâm, để hệ thống tự theo dõi thay vì phải polling thủ công.\n- **B2 (P0):** Là tenant B2B, muốn nhận webhook call với alert payload khi rule trigger, để tự động hoá hành động downstream không cần polling.\n- **B3 (P0):** Là tenant B2B, muốn xem alert history và delivery status (delivered / failed / retrying), để audit độ tin cậy của hệ.\n\n### Usage & quota\n\n- **B4 (P1):** Là tenant B2B, muốn xem usage hiện tại (active rules, alerts fired this month) so với quota, để lên kế hoạch capacity.\n\n### Edge cases\n\n- **B5 (P0):** Là tenant B2B, khi webhook delivery thất bại, muốn hệ tự retry với exponential backoff, để failure tạm thời không đồng nghĩa mất alert.\n- **B6 (P0):** Là tenant B2B, nếu vượt quota, muốn rule evaluation pause (không drop silently), để có cơ hội nâng gói hoặc giảm rule thủ công.\n\n---\n\n## 5. Requirements\n\n### P0 — Must-have\n\n---\n\n#### R01 — Hạ tầng repo & Docker Compose\n\n**Mô tả:** Mono-repo Gradle multi-project; 7 service Spring Boot + FE React/Vite + `infra/`.\n\n**Docker Compose profile:**\n\n| Profile | Service |\n|---------|---------|\n| `core` | gateway, identity, identity-db |\n| `feed` | market-feed, rabbitmq |\n| `processing` | aggregation, aggregation-db, rule-engine, rule-engine-db, rabbitmq |\n| `delivery` | alert-delivery, alert-delivery-db, billing, billing-db, mailhog, rabbitmq |\n| `full` | tất cả + dashboard |\n\n**Acceptance Criteria:**\n- `docker compose --profile core up -d` → gateway :8080 + identity :8081 healthy.\n- Mỗi profile `up` không lỗi `cannot connect to <service ngoài profile>`.\n- Service nào thiếu dependency ngoài profile → log WARN và tiếp tục, không crash JVM.\n\n---\n\n#### R02 — `market-feed`: 3 chế độ hoạt động\n\n**Mô tả:** Connector Binance WebSocket với 3 mode runtime.\n\n| Mode | Hành vi |\n|------|---------|\n| `live` | Kết nối Binance WS public; chuẩn hoá trade → TradeEvent; publish queue; auto-reconnect khi mất kết nối |\n| `record` | Giống `live` + ghi NDJSON ra file với timestamp gốc |\n| `replay` | Đọc file NDJSON đã record; phát lại với multiplier ×N; giữ tỉ lệ thời gian tương đối |\n\n**Acceptance Criteria:**\n- Chuyển mode bằng env `FEED_MODE=live|record|replay`.\n- `replay` ×3: phát đúng thứ tự timestamp, hoàn thành trong 1/3 thời gian gốc (±10%).\n- `live` mất kết nối WS → log WARN, không crash JVM, tự reconnect trong 30 giây.\n\n---\n\n#### R03 — `rule-engine`: 3 loại rule\n\n**Mô tả:** Evaluate rule theo trade stream và candle stream real-time.\n\n| Loại rule | Điều kiện trigger |\n|-----------|-------------------|\n| `PRICE_THRESHOLD` | Symbol X vượt/tụt mức giá P (so với trade mới nhất) |\n| `PERCENT_CHANGE` | Symbol X thay đổi ≥ p% trong N phút (dùng dữ liệu aggregation) |\n| `VOLUME_SPIKE` | Volume 1 phút ≥ k× trung bình 60 phút (dùng dữ liệu aggregation) |\n\n**Acceptance Criteria:**\n- `PRICE_THRESHOLD` kích hoạt trong vòng 1 giây kể từ trade vượt ngưỡng.\n- `PERCENT_CHANGE` chính xác ±0.1% so với tính tay trên cùng window.\n- `VOLUME_SPIKE` không false-positive khi volume đều đặn.\n- Rule bị EVAL_PAUSED (do quota) → không trigger, không mất dữ liệu.\n\n---\n\n#### R04 — `alert-delivery`: webhook + retry\n\n**Mô tả:** Gửi HTTP POST đến endpoint webhook của tenant khi rule trigger; xử lý retry và audit.\n\n**Payload webhook:**\n```json\n{\n  \"alertId\": \"uuid\",\n  \"ruleId\": \"uuid\",\n  \"symbol\": \"BTCUSDT\",\n  \"ruleType\": \"PRICE_THRESHOLD\",\n  \"triggeredAt\": \"2026-07-04T10:00:00Z\",\n  \"triggerValue\": \"49850.00\"\n}\n```\n\n**Retry logic:**\n- `2xx` → status `DELIVERED`\n- `4xx` → status `CLIENT_ERROR`, không retry\n- `5xx` / timeout → retry sau 1s, 4s, 16s; sau 3 lần → `FAILED`\n\n**Acceptance Criteria:**\n- Alert history lưu đủ: attempted_at, http_status, status mỗi attempt.\n- Sau 3 lần thất bại: status = FAILED, không retry thêm.\n- Alert vẫn xuất hiện trong history kể cả khi FAILED.\n\n---\n\n#### R05 — `identity` + `gateway`: Tenant và API key\n\n**Mô tả:** Tenant quản lý API key; gateway xác thực mọi request trước khi forward.\n\n**Auth flow:**\n1. Gateway nhận `X-API-Key: <raw-key>`.\n2. Tính SHA-256 hash; tra cache Caffeine (TTL 5s).\n3. Cache miss → gọi `identity GET /internal/keys/{hash}`.\n4. Key hợp lệ → thêm `X-Tenant-Id`, xoá `X-API-Key`, forward.\n5. Key không tồn tại / revoked → 401.\n\n**Acceptance Criteria:**\n- Request không có key → 401.\n- Key sai → 401.\n- Key bị revoke → 401 trong vòng 5 giây (TTL cache hết).\n- Request hợp lệ → forward giữ nguyên body.\n\n---\n\n#### R06 — `billing`: usage + quota\n\n**Mô tả:** Đếm usage theo tenant; enforce quota theo gói.\n\n**Quota enforcement:**\n- **Rule quota (sync):** rule-engine check `billing GET /internal/quota/{tenantId}` khi tạo rule; cache 30s.\n- **Alert quota (async event-driven):** billing consume AlertTriggeredEvent → đếm; khi vượt → phát `QuotaExceededEvent` → rule-engine pause eval tenant.\n\n**Acceptance Criteria:**\n- `usage.alertsFired` khớp đếm tay từ alert_history.\n- Vượt quota rule → HTTP 402 khi tạo rule thứ (limit+1); rule không được tạo.\n- Usage reset đúng đầu kỳ (tháng).\n- Vượt quota alert → rule eval pause, không drop alert đã trigger trước đó.\n\n---\n\n#### R07 — `dashboard` (FE portal)\n\n**Mô tả:** React + Vite SPA — giao diện quản lý đầy đủ cho tenant.\n\n**Tính năng:**\n- Quản lý API key: tạo, xem danh sách, thu hồi.\n- Rule CRUD: tạo (symbol + type + params + webhookUrl), xem danh sách, xoá.\n- Alert history: phân trang, filter; xem delivery attempts từng alert.\n- Usage widget: active rules vs limit, alerts fired vs limit (progress bar).\n\n**Acceptance Criteria:**\n- Luồng \"tạo rule → thấy alert trigger → xem webhook DELIVERED\" hoàn chỉnh trong UI, không cần gọi API thủ công.\n- Dashboard hiển thị thông báo rõ khi vượt quota.\n- API key raw chỉ hiển thị 1 lần ngay sau khi tạo.\n\n---\n\n## 6. Acceptance Criteria tổng hợp\n\n### Happy path — luồng end-to-end\n\n```\nGiven: docker compose --profile full up -d (7 service + RabbitMQ + 5 PG + Mailhog)\n  And: tenant T1 đã tạo, API key K1 issued\n  And: rule R1 = PRICE_THRESHOLD BTC/USDT BELOW 50000\n        webhook = http://localhost:9999/hook\nWhen:  market-feed ở chế độ live\n  And: BTC/USDT trade price xuống dưới 50000\nThen:  trong vòng 2 giây, alert-delivery gửi POST đến localhost:9999/hook\n  And: payload chứa ruleId=R1, symbol=BTCUSDT, triggeredAt (ISO-8601), triggerValue < 50000\n  And: alert history trong dashboard hiển thị status=DELIVERED\n  And: billing tăng alertsFired cho tenant T1 thêm 1\n```\n\n### Retry khi webhook fail\n\n```\nGiven: endpoint webhook trả HTTP 500 liên tục\nWhen:  rule trigger → alert-delivery nhận AlertTriggeredEvent\nThen:  thử lại sau 1s, thử lại sau 4s, thử lại sau 16s\n  And: sau lần thứ 3 thất bại → status = FAILED, không retry thêm\n  And: alert xuất hiện trong history với status = FAILED và attemptCount = 3\n```\n\n### Quota rule vượt mức\n\n```\nGiven: tenant T1 có gói giới hạn 2 active rules\n  And: T1 đã tạo 2 rule đang ACTIVE\nWhen:  T1 gọi POST /api/v1/rules để tạo rule thứ 3\nThen:  gateway/rule-engine trả HTTP 402 { \"error\": \"QUOTA_EXCEEDED_RULES\" }\n  And: không có rule nào được tạo trong DB\n  And: dashboard hiển thị thông báo vượt quota\n```\n\n### Compose profile độc lập\n\n```\nGiven: docker compose --profile feed up -d\nWhen:  market-feed khởi động\nThen:  market-feed + rabbitmq healthy\n  And: không lỗi \"cannot connect to gateway/identity/aggregation\"\n  And: market-feed log được ít nhất 1 trade từ Binance WS trong 10 giây\n```\n\n### Replay mode\n\n```\nGiven: file record có 1000 trade BTC/USDT ghi ở tốc độ thật (T giây)\n  And: FEED_MODE=replay, REPLAY_MULTIPLIER=3\nWhen:  market-feed khởi động chế độ replay\nThen:  1000 trade phát hết trong khoảng T/3 giây (±10%)\n  And: thứ tự timestamp giữ nguyên\n  And: trade đẩy vào RabbitMQ queue giống chế độ live\n```\n\n### Negative cases\n\n| Tình huống | Kết quả mong đợi |\n|------------|-----------------|\n| YAML chặng không có field `part` | Sidenav vẫn render, không crash |\n| API key bị revoke | Request tiếp theo trong ≤5s → 401 |\n| market-feed mất WS Binance | Log WARN, JVM không crash, tự reconnect |\n| webhook endpoint không reach được | Timeout → retry theo lịch |\n\n---\n\n## 7. Open Questions (đã giải quyết)\n\n| # | Câu hỏi | Quyết định |\n|---|---------|------------|\n| OQ1 | RabbitMQ vs Kafka? | **RabbitMQ** — tiết kiệm ~500MB RAM, DLQ native. (ADR-001) |\n| OQ2 | Mono-repo vs multi-repo? | **Mono-repo** Gradle multi-project — 1 commit = 1 state hoàn chỉnh. (ADR-002) |\n| OQ3 | Quota check ở đâu? | **Hybrid**: rule CRUD = sync REST; alert quota = async event. (ADR-003) |\n| OQ4 | Dashboard FE stack? | **React + Vite** — nhất quán prereq. (ADR-004) |\n| OQ5 | \"Gãy\" Chặng 9 định nghĩa thế nào? | Queue depth > 5,000 msg VÀ tăng = tiêu chí chính. (architecture §7.1) |\n"
