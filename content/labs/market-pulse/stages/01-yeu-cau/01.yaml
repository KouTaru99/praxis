    Lab gồm **4 Phần / 10 Chặng / 78 bước**. Phần A đặt nền móng (chặng này + gateway/identity), Phần B thổi dòng dữ liệu sống vào hệ, Phần C xây nghiệp vụ cảnh báo, Phần D là mặt tiền dashboard và bài kiểm tra chịu tải. Nguyên tắc xuyên suốt: **hệ chạy được từng phần** — xong milestone nào bạn thấy kết quả milestone đó bằng docker compose profile, không phải dựng đủ 7 service mới thấy gì.

    Cũng như mọi dự án thật, ta **không mở editor gõ code ngay**. Việc đầu tiên của Chặng 1 là trả lời: hệ thống này phải làm được gì, cho ai, và tốt tới mức nào.
