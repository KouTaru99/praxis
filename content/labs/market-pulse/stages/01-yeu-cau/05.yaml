id: yc-05
title: Skeleton 7 service Spring Boot
order: 5
est_minutes: 45
commit_ref: cf38bb8
goal: 'Dựng bộ khung tối thiểu cho cả 7 service: main class + application.yml (port riêng + actuator health).'
deliverable: '7 module service compile được, mỗi service 3 file: build.gradle.kts, Application.java, application.yml.'
outcome_preview: Sau bước này ./gradlew build là BUILD SUCCESSFUL cho cả 8 module — mỗi service đã là một app Spring Boot chạy được, có health endpoint riêng.
blocks:
- type: prose
  content: |
    Mỗi service lúc này chỉ cần là một app Spring Boot **tối thiểu**: 1 main class, 1 file cấu hình khai port + bật actuator (bộ endpoint quản trị của Boot — ta cần `/actuator/health` để Docker healthcheck ở các chặng sau). Bảng port đã chốt trong README:

    - gateway 8080 · identity 8081 · market-feed 8082 · rule-engine 8083 · alert-delivery 8084 · billing 8085 · aggregation 8086

    Điểm khác biệt duy nhất: **gateway** dùng Spring Cloud Gateway — chạy trên WebFlux (mô hình non-blocking, không chặn luồng khi chờ I/O), nên dependency của nó khác 6 service còn lại (không có starter-web). Sáu service kia dùng chung một khuôn: starter-web + actuator + common.

    Tạo lần lượt 21 file dưới đây — dài nhưng lặp khuôn, copy tới đâu hình dung hệ tới đó:
- type: code
  filename: gateway/build.gradle.kts
  lang: kotlin
  content: |
    plugins {
        id("org.springframework.boot")
        id("io.spring.dependency-management")
    }

    dependencies {
        implementation("org.springframework.cloud:spring-cloud-starter-gateway")
        implementation("org.springframework.boot:spring-boot-starter-actuator")
        // Caffeine cache — dùng cho API key lookup
        implementation("com.github.ben-manes.caffeine:caffeine")
        // gateway không cần common (không publish/consume event)
        testImplementation("org.springframework.boot:spring-boot-starter-test")
    }
- type: code
  filename: gateway/src/main/java/com/marketpulse/gateway/GatewayApplication.java
  lang: java
  content: |
    package com.marketpulse.gateway;

    import org.springframework.boot.SpringApplication;
    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication
    public class GatewayApplication {
        public static void main(String[] args) {
            SpringApplication.run(GatewayApplication.class, args);
        }
    }
- type: code
  filename: gateway/src/main/resources/application.yml
  lang: yaml
  content: |
    server:
      port: 8080

    spring:
      application:
        name: gateway

    management:
      endpoints:
        web:
          exposure:
            include: health,info
      endpoint:
        health:
          show-details: always
- type: code
  filename: identity/build.gradle.kts
