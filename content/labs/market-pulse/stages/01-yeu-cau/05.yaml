- type: command
  label: Build cả hệ lần đầu
  content: |
    ./gradlew build
    # BUILD SUCCESSFUL — 8 module compile + dong jar
- type: callout
  variant: warning
  content: Nếu build fail kiểu "project ':common' not found" — kiểm tra lại tên module trong settings.gradle.kts khớp đúng tên thư mục; còn lỗi thiếu class sự kiện thì xem lại từng build.gradle.kts của service đã có dòng implementation(project(":common")) chưa.
- type: command
  label: Lưu mốc bước 1.5
  content: |
    git add gateway identity market-feed aggregation rule-engine alert-delivery billing
    git commit -m "[step-1.5] Skeleton 7 service Spring Boot: port 8080-8086, actuator, gateway Spring Cloud"
