  lang: markdown
  content: "# ADR-004 — Dashboard Frontend: React + Vite\n\n| Trường | Giá trị |\n|--------|---------|\n| **Status** | Accepted |\n| **Ngày quyết định** | 2026-07-05 |\n| **Người quyết định** | PO + Architect (Market Pulse GĐ1) |\n| **Blocking** | Non-blocking (có thể quyết sau OQ1–3; tuy nhiên ảnh hưởng cấu hình CORS gateway) |\n\n---\n\n## Context\n\nMarket Pulse cần một giao diện web cho tenant để quản lý API key, rule CRUD, xem alert history và usage widget.\n\n**Ngữ cảnh Lab:** Người học đã làm qua mini-wiki với React + Vite. Đây là prereq (điều kiện tiên quyết) của Lab lớn Market Pulse. Thay đổi stack FE = tăng thêm learning curve không liên quan đến mục tiêu chính (hiểu kiến trúc microservices, không phải học FE mới).\n\n---\n\n## Các lựa chọn\n\n### Phương án A — React + Vite (giữ nguyên prereq) ✓\n\n**React** (95M npm downloads/tuần) — UI library dựa trên component.  \n**Vite** (70k ⭐ GitHub) — build tool thế hệ mới dùng ES modules native; dev server cold start < 300ms.\n\n| Tiêu chí | Đánh giá |\n|----------|----------|\n| Nhất quán prereq | ✓ Người học đã quen từ mini-wiki |\n| Time-to-first-screen (dev) | Nhanh — Vite HMR (Hot Module Replacement) instant |\n| Phù hợp use case | ✓ SPA (Single-Page Application) — dashboard CRUD authenticated không cần SSR |\n| Tooling ecosystem | Vite + React Router + Tanstack Query — stable, docs tốt |\n| Độ phức tạp setup | Thấp — `npm create vite@latest` là đủ |\n| Adoption | React: Facebook, Airbnb, Netflix; Vite: Vue official, Svelte |\n\n---\n\n### Phương án B — Next.js (React với SSR/SSG)\n\n**Next.js** (127k ⭐ GitHub, 7M npm downloads/tuần) — React framework thêm SSR (Server-Side Rendering), file-based routing, API routes.\n\n| Tiêu chí | Đánh giá |\n|----------|----------|\n| Nhất quán prereq | ✗ Người học chưa biết Next.js routing, App Router, server component |\n| Phù hợp use case | SSR/SSG không cần thiết cho dashboard nội bộ sau auth |\n| Complexity | Cao hơn: hydration, server component, route group, middleware |\n| Giá trị thêm | Dạy Next.js nhưng đây không phải mục tiêu Lab |\n\n---\n\n### Phương án C — Vue 3 + Vite\n\n| Tiêu chí | Đánh giá |\n|----------|----------|\n| Nhất quán prereq | ✗ Người học biết React, không biết Vue Composition API |\n| Chất lượng | Tốt — Vue 3 mature, Vite là official build tool |\n| Barrier | Đổi syntax (script setup, ref, reactive, v-if/v-for) |\n| Giá trị thêm | Dạy Vue nhưng đây không phải mục tiêu Lab |\n\n---\n\n### So sánh tổng hợp\n\n| Tiêu chí | React + Vite ✓ | Next.js | Vue 3 + Vite |\n|----------|----------------|---------|--------------|\n| Prereq nhất quán | ✓ | Gần (React nhưng thêm framework) | ✗ |\n| Phù hợp SPA dashboard | ✓ | Overkill | ✓ |\n| Learning curve thêm | Không | Trung bình | Cao |\n| Ecosystem | Mature | Mature | Mature |\n\n---\n\n## Quyết định\n\n**Chọn React + Vite.**\n\nLý do:\n\n1. **Nhất quán prereq** — không đổi stack FE đồng nghĩa người học tập trung vào mục tiêu chính: hiểu kiến trúc microservices, không phải học framework mới.\n\n2. **SPA đủ dùng** — dashboard là authenticated CRUD portal; không có URL công khai cần index; không cần SEO; SSR mang lại zero benefit.\n\n3. **Dev experience tốt** — Vite HMR nhanh; build nhỏ; không cần server Node.js riêng để chạy dashboard (chỉ cần `npm run dev` cho dev, `npm run build` + serve static cho prod-sim).\n\n---\n\n## CORS Configuration (gateway)\n\nVì dashboard (`:5173`) gọi gateway (`:8080`) khác origin, gateway phải cấu hình CORS:\n\n```yaml\nspring:\n  cloud:\n    gateway:\n      globalcors:\n        cors-configurations:\n          '[/**]':\n            allowedOrigins:\n              - \"http://localhost:5173\"\n            allowedMethods: [\"GET\",\"POST\",\"DELETE\",\"OPTIONS\"]\n            allowedHeaders: [\"*\"]\n            allowCredentials: false\n```\n\n---\n\n## Tech stack chi tiết\n\n| Layer | Thư viện | Lý do |\n|-------|---------|-------|\n| UI framework | React 18 | Prereq; hooks ecosystem |\n| Build tool | Vite 5 | Dev speed; Vite + React plugin |\n| Routing | React Router v6 | Standard; file-based optional |\n| Data fetching | TanStack Query v5 | Cache, invalidation, loading state tự động |\n| HTTP client | Axios | Interceptors tiện lợi (gắn X-API-Key tự động) |\n| UI components | shadcn/ui hoặc Mantine 8 | Component đẹp, không custom từ đầu |\n| State (global) | Zustand (nếu cần) | Nhẹ hơn Redux cho usecase này |\n\n---\n\n## Consequences\n\n**Tích cực:**\n- Người học không bị distract bởi FE framework mới — focus vào Spring Boot + microservices.\n- Build output là static files — có thể serve bằng nginx container trong profile `full`, không cần Node.js runtime trong production.\n- Cộng đồng React lớn — người học dễ tìm tài liệu hơn.\n\n**Đánh đổi / hạn chế:**\n- `dashboard/` không phải Gradle subproject — CI/CD cần 2 pipeline riêng (Gradle + npm) hoặc dùng Gradle plugin wrapper (không cần thiết cho Lab).\n- Nếu sau này cần SSR (SEO, initial load performance) — phải migrate sang Next.js hoặc Remix; không phải vấn đề với authenticated dashboard.\n"
