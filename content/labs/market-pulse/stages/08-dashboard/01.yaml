  content: Chặng 8 mở **Phần D**, phần cuối cùng của Lab. Bảy service phía sau (Chặng 2-7) tới giờ chỉ được gọi qua `curl` hoặc script smoke test. **dashboard** là lần đầu tiên có một giao diện thật, để tận mắt NHÌN THẤY luồng dữ liệu chảy qua hệ thống, thay vì đọc log hay JSON thô.
