  content: 'Đây là một đánh đổi kiến trúc nhỏ nhưng đáng nói: "ráp dữ liệu ở tầng hiển thị" thay vì "thêm một lời gọi service-to-service mới". Cách này tránh tăng thêm một phụ thuộc backend (billing→rule-engine) chỉ để phục vụ một con số hiển thị — cái giá là frontend phải tự làm phép tính, chấp nhận được vì dữ liệu vốn công khai qua API tenant đã có quyền gọi.'
