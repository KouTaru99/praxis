id: qs-02
title: 'Round 1 — một rule, tăng dần multiplier: kế hoạch gốc không khớp thực tế'
order: 2
est_minutes: 20
commit_ref: 325ce4c
goal: Chạy load-test với 1 rule PRICE_THRESHOLD ở multiplier tăng dần ×3 → ×2000, đối chiếu với giả định kế hoạch ban đầu ('×10 sẽ gãy').
deliverable: Bảng kết quả 5 mức multiplier — không có mức nào gãy theo tiêu chí OQ5.
outcome_preview: Sau bước này, bạn sẽ thấy một kế hoạch kỹ thuật hợp lý lúc viết ra vẫn có thể sai khi đối chiếu với số đo thật — và đó là kết quả BÌNH THƯỜNG của việc đo, không phải thất bại.
blocks:
- type: prose
  content: 'Kế hoạch viết từ pha kiến trúc (`architecture.md §7.1`) dự đoán: "replay ×3 OK; ×10 BROKEN; fix; ×10 PASS". Chạy thử để kiểm chứng dự đoán đó — không phải để xác nhận nó đúng, mà để xem SỰ THẬT là gì:'
- type: command
  label: Chạy load-test tăng dần multiplier
  content: |
    bash scripts/load-test.sh 3 60
    bash scripts/load-test.sh 10 60
    bash scripts/load-test.sh 50 60
    bash scripts/load-test.sh 500 60
    bash scripts/load-test.sh 2000 60
- type: code
  filename: Round 1 - ket qua do that (khong lam tron de khop kich ban)
  lang: text
  content: |
    Multiplier | Tốc độ ước tính   | Queue depth quan sát (60s)          | Kết luận
    -----------|--------------------|--------------------------------------|------------------------------------------
    ×3         | ~190 trade/s       | luôn = 0                              | PASS xa SLO
    ×10        | ~630 trade/s       | luôn = 0                              | PASS — KHÔNG gãy như kế hoạch giả định
    ×50        | ~3.150 trade/s     | luôn = 0                              | PASS
    ×500       | ~31.500 trade/s    | dao động 30-319, không tăng liên tục  | Có độ trễ thật nhưng chưa gãy
    ×2000      | ~126.000 trade/s   | dao động 0-319, không tăng liên tục   | Vẫn chưa gãy
- type: callout
  variant: warning
  content: Kế hoạch gốc "×10 BROKEN" **KHÔNG xảy ra**. Với 1 rule so sánh `BigDecimal` đơn giản, một luồng tiêu thụ duy nhất xử lý dư sức mọi mức tải thử được trên máy local — kể cả ×2000 (~126.000 trade/giây, gấp hơn ngàn lần tốc độ Binance thật). Đây không phải lỗi đo — là bằng chứng hệ bền hơn giả định lúc lập kế hoạch.
- type: callout
  variant: info
  content: 'Ở ×500-2000, có độ trễ dao động nhưng KHÔNG tăng liên tục — và khi truy đến gốc, độ trễ đó đến từ chính `ReplayFeed` phải mở-lại/đọc-lại file liên tục vì vòng lặp quá ngắn (~68ms/vòng ở ×2000), không phải rule-engine xử lý chậm. Bài học phương pháp quan trọng: phải phân biệt **giới hạn của công cụ đo** (ReplayFeed, Chặng 3) khỏi **giới hạn của hệ thống đang test** (rule-engine) — nhầm lẫn hai thứ này dễ dẫn tới kết luận sai.'
