outcome_preview: Sau bước này, có một tệp dữ liệu Binance thật để replay lặp lại nhiều lần, và một script tự động biết khi nào nên gọi là 'gãy'.
blocks:
- type: prose
  content: 'Chặng 9 vẫn ở **Phần D**, nhưng đổi vai trò: không viết thêm tính năng, mà **đặt câu hỏi** — hệ đã xây từ Chặng 1-8 chịu được tải tới đâu? Ngưỡng "gãy" không phải đoán bừa lúc này, mà đã chốt từ pha kiến trúc (OQ5): queue `rule-engine.trades` vượt **5.000 message và còn tăng** là tiêu chí chính; ngoài ra còn latency alert p95 và tỉ lệ lỗi webhook.'
