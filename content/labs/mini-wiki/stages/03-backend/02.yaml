id: be-02
title: Chạy PostgreSQL + áp schema + seed dữ liệu
order: 2
est_minutes: 40
commit_ref: 7b6209f
goal: Dựng PostgreSQL bằng Docker, áp migration tạo 3 bảng, và nạp dữ liệu mẫu để có cái mà thử.
deliverable: docker-compose.yml (service db) + api/src/db/seed.ts; DB có 3 bảng + 4 tag + 3 bài viết.
outcome_preview: Bạn sẽ có một database PostgreSQL chạy thật, đã đầy dữ liệu mẫu, sẵn sàng cho API truy vấn.
blocks:
- type: prose
  content: |
    Schema ở Chặng 2 mới là file `schema.ts` + migration SQL trên đĩa — chưa có database thật. Bước này ta: (1) chạy PostgreSQL bằng **Docker** (không phải cài trực tiếp lên máy), (2) áp migration tạo bảng, (3) nạp **dữ liệu mẫu** để có cái mà thử ở các bước sau.
- type: prose
  content: |
    Tạo `docker-compose.yml` ở thư mục gốc dự án. Chú ý `healthcheck` — Docker dùng nó để biết DB đã sẵn sàng nhận kết nối chưa:
- type: code
  filename: docker-compose.yml
  lang: yaml
  content: |
    services:
      # service api + web sẽ thêm ở Chặng 6
      db:
        image: postgres:16-alpine
        environment:
          POSTGRES_DB: miniwiki
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
        ports:
          - '5432:5432'
        volumes:
          - pgdata:/var/lib/postgresql/data
        healthcheck:
          test: ['CMD-SHELL', 'pg_isready -U dev -d miniwiki']
          interval: 5s
          timeout: 5s
          retries: 5

    volumes:
      pgdata:
- type: command
  label: Chạy DB + tạo file .env + áp schema
  content: |
    docker compose up -d db          # khởi động PostgreSQL (chờ healthy)
    cd api
    cp .env.example .env             # tạo .env thật từ mẫu
    npm run db:generate              # drizzle-kit generate — diff schema.ts -> SQL migration
    npm run migrate                  # áp migration 0000_init -> tạo 3 bảng
- type: prose
  content: |
    Giờ viết `api/src/db/seed.ts` để nạp dữ liệu mẫu. Điểm đáng học ở đây là hàm **toSlug** (dùng thư viện `slugify` locale `vi`) chuyển tiêu đề tiếng Việt thành slug ASCII, và cách **upsert** trong Drizzle qua `onConflictDoUpdate`:
- type: code
  filename: api/src/db/seed.ts
  lang: typescript
  content: |
    import { count, eq } from 'drizzle-orm';
    import { db, pool } from '../lib/db.js';
    import { articles, articleTags, tags } from './schema.js';
    import { toSlug } from '../lib/slug.js';

    const TAGS = [
      { name: 'JavaScript', slug: 'javascript' },
      { name: 'Git',        slug: 'git' },
      { name: 'DevOps',     slug: 'devops' },
      { name: 'PostgreSQL', slug: 'postgresql' },
    ] as const;

    // ARTICLES: 3 bài viết mẫu (title + content Markdown + tags).
    // Xem nội dung đầy đủ ở commit đối chiếu bên dưới.
    const ARTICLES = [ /* ... 3 bài, mỗi bài { title, content, publishedAt, tags } ... */ ];

    async function main() {
      // 1. Upsert tags (slug là unique key -> chạy lại không tạo trùng)
      const tagMap = new Map<string, number>();
      for (const t of TAGS) {
        const [tag] = await db.insert(tags).values(t)
          .onConflictDoUpdate({ target: tags.slug, set: { name: t.name } })
          .returning();
        tagMap.set(t.slug, tag.id);
      }
      // 2. Upsert articles + gắn tag (xóa link cũ rồi tạo lại -> idempotent)
      for (const data of ARTICLES as any[]) {
        const slug = toSlug(data.title);
        const [article] = await db.insert(articles)
          .values({ title: data.title, slug, content: data.content, publishedAt: data.publishedAt })
          .onConflictDoUpdate({
            target: articles.slug,
            set: { title: data.title, content: data.content, publishedAt: data.publishedAt, updatedAt: new Date() },
          })
          .returning();
        await db.delete(articleTags).where(eq(articleTags.articleId, article.id));
        for (const tagSlug of data.tags) {
          const tagId = tagMap.get(tagSlug);
          if (tagId) await db.insert(articleTags).values({ articleId: article.id, tagId });
        }
      }
    }

    main()
      .catch((e) => { console.error('Seed thất bại:', e); process.exit(1); })
      .finally(() => pool.end());
- type: command
  label: Nạp dữ liệu + lưu mốc bước 3.2
  content: |
    npm run seed                     # chạy src/db/seed.ts
    # kiểm tra: docker exec -it <db> psql -U dev -d miniwiki -c "\dt"  -> 3 bảng
    git add ../docker-compose.yml src/db/seed.ts src/db/migrate.ts src/db/reset.ts
    git commit -m "[step-3.2] Drizzle migrate/seed/reset script + docker-compose(db)"
- type: callout
  variant: info
  content: |
    **Vì sao dùng onConflictDoUpdate thay vì insert thường trong seed?** Tương đương `upsert` của Prisma: "cập nhật nếu đã có, tạo mới nếu chưa" (Postgres `ON CONFLICT ... DO UPDATE` gốc). Nhờ vậy bạn chạy `npm run seed` **nhiều lần** mà không bị lỗi trùng slug hay nhân đôi dữ liệu — gọi là *idempotent* (chạy bao nhiêu lần kết quả vẫn như nhau). Một seed script tốt luôn nên idempotent.
- type: callout
  variant: warning
  content: |
    **published_at phải nullable thật.** Nếu ở bước trước bạn lỡ thêm `.defaultNow()` cho cột này trong schema, bài "nháp" (publishedAt = null) sẽ không tạo được đúng. Kiểm tra nhanh trong DB: cột `published_at` phải cho phép NULL.
