goal: Thêm endpoint tìm kiếm toàn văn dùng GIN index của PostgreSQL — an toàn trước SQL injection.
deliverable: api/src/controllers/search.controller.ts + route; GET /api/search?q=... trả bài khớp.
outcome_preview: Bạn sẽ gõ một từ khóa và nhận về danh sách bài viết chứa từ đó, tìm trong cả tiêu đề lẫn nội dung.
blocks:
- type: prose
  content: |
    Bước cuối Chặng 3: **tìm kiếm toàn văn (Full-Text Search)**. PostgreSQL làm việc này sẵn, không cần Elasticsearch. Ta tận dụng **GIN index** đã tạo ở migration (Chặng 2) qua truy vấn `to_tsvector ... @@ plainto_tsquery`.

    Vì đây là truy vấn SQL nâng cao mà Prisma Client không có sẵn API, ta dùng `$queryRaw` — nhưng phải dùng **Prisma.sql tham số hóa** (`${...}`), tuyệt đối không nối chuỗi:
- type: code
  filename: api/src/controllers/search.controller.ts
  lang: typescript
  content: |
    import type { Request, Response } from 'express';
    import { Prisma } from '@prisma/client';
    import { AppError } from '../middleware/errorHandler.js';
    import { prisma } from '../lib/prisma.js';

    type RawArticleRow = { id: number; title: string; slug: string; published_at: Date | null };
    type TagSummary = { id: number; name: string; slug: string };

    // S1 — GET /api/search?q=&page=&limit=
    export async function search(req: Request, res: Response) {
      const q = (req.query.q as string | undefined)?.trim();
      if (!q) throw new AppError(400, 'QUERY_REQUIRED', "Tham số 'q' là bắt buộc.");

      const page = Math.max(1, parseInt(req.query.page as string) || 1);
      const limit = Math.min(100, Math.max(1, parseInt(req.query.limit as string) || 20));
      const offset = (page - 1) * limit;

      // ${q}, ${limit}, ${offset} được THAM SỐ HÓA -> không thể inject SQL.
      // GIN index trên to_tsvector('simple', title || ' ' || content) tăng tốc.
      const [rows, countRows] = await Promise.all([
        prisma.$queryRaw<RawArticleRow[]>(Prisma.sql`
          SELECT id, title, slug, published_at FROM articles
          WHERE to_tsvector('simple', title || ' ' || content) @@ plainto_tsquery('simple', ${q})
          ORDER BY published_at DESC NULLS LAST, id DESC
          LIMIT ${limit} OFFSET ${offset}
        `),
        prisma.$queryRaw<[{ count: bigint }]>(Prisma.sql`
          SELECT COUNT(*) AS count FROM articles
          WHERE to_tsvector('simple', title || ' ' || content) @@ plainto_tsquery('simple', ${q})
        `),
      ]);
      const total = Number(countRows[0]?.count ?? 0);

      // Lấy tags theo batch (1 query cho mọi bài) -> tránh N+1 query
      const articleIds = rows.map((r) => r.id);
      const tagMap = new Map<number, TagSummary[]>();
      if (articleIds.length > 0) {
        const atRows = await prisma.articleTag.findMany({
          where: { articleId: { in: articleIds } },
          include: { tag: { select: { id: true, name: true, slug: true } } },
        });
        for (const at of atRows) {
          const list = tagMap.get(at.articleId) ?? [];
          list.push({ id: at.tag.id, name: at.tag.name, slug: at.tag.slug });
          tagMap.set(at.articleId, list);
        }
      }

      const data = rows.map((r) => ({
        id: r.id, title: r.title, slug: r.slug,
        published_at: r.published_at, tags: tagMap.get(r.id) ?? [],
      }));
      res.json({ data, meta: { total, page, limit, query: q } });
    }
- type: code
  filename: api/src/routes/search.routes.ts + index.ts
  lang: typescript
  content: |
    // search.routes.ts
    import { Router } from 'express';
    import { search } from '../controllers/search.controller.js';
    const router = Router();
    router.get('/', search);
    export default router;

    // index.ts (thêm)
    import searchRouter from './routes/search.routes.js';
    app.use('/api/search', searchRouter);
- type: callout
  variant: warning
  content: |
    **$queryRaw chỉ an toàn khi tham số hóa.** Nếu bạn nối thẳng từ khóa vào câu SQL (kiểu `'...' + q + '...'`), kẻ tấn công gõ từ khóa độc hại có thể *thoát* khỏi chuỗi và chạy SQL tùy ý — đó là **SQL Injection**. Cú pháp Prisma.sql với `${q}` gửi `q` như một *tham số riêng*, không phải một phần câu lệnh — DB tự xử lý an toàn. Đây là quy tắc bất di bất dịch khi viết raw SQL.
- type: callout
  variant: info
  content: |
    **Tránh "N+1 query".** Nếu với mỗi bài tìm được lại gọi DB một lần để lấy tag, 20 bài = 21 lần gọi DB (1 + N). Ở đây ta gom: lấy hết tag của 20 bài trong **một** query `where articleId in [...]`, rồi map lại trong bộ nhớ. N+1 là một trong những lỗi hiệu năng phổ biến nhất ở backend.
