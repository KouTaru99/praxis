id: be-01
title: Khởi tạo project Express + TypeScript
order: 1
est_minutes: 30
commit_ref: 0ef9477
goal: Dựng bộ khung server Express bằng TypeScript, với xử lý lỗi tập trung ngay từ đầu.
deliverable: Thư mục api/ chạy được; GET /health trả JSON status ok.
outcome_preview: Bạn sẽ gọi http://localhost:3000/health và nhận về JSON trạng thái ok — server đã sống.
blocks:
- type: prose
  content: |
    Hết giai đoạn giấy tờ — giờ **viết code thật**. Ta dựng khung Back-end trong thư mục `api/`: Express 5 + TypeScript, kèm sẵn **xử lý lỗi tập trung** để không bao giờ "nuốt lỗi thầm" (NFR-8).
- type: command
  label: Tạo thư mục api/ và cài dependencies
  content: |
    mkdir api && cd api
    npm init -y
    npm install express cors morgan dotenv drizzle-orm pg
    npm install -D typescript tsx drizzle-kit @types/express @types/cors @types/morgan @types/node @types/pg
- type: prose
  content: |
    Cấu hình `package.json` — chú ý `"type": "module"` (dùng ES Module) và các script cho Drizzle. Khác Prisma (1 lệnh `migrate dev` vừa tạo vừa áp), Drizzle tách rõ 2 bước: `db:generate` sinh SQL từ diff schema, `migrate` mới thật sự áp vào DB:
- type: code
  filename: api/package.json
  lang: json
  content: |
    {
      "name": "miniwiki-api",
      "version": "0.1.0",
      "type": "module",
      "scripts": {
        "dev": "NODE_ENV=development tsx watch src/index.ts",
        "build": "tsc",
        "start": "node dist/index.js",
        "db:generate": "drizzle-kit generate",
        "migrate": "tsx src/db/migrate.ts",
        "seed": "tsx src/db/seed.ts",
        "db:reset": "tsx src/db/reset.ts && npm run migrate && npm run seed"
      }
    }
- type: code
  filename: api/tsconfig.json
  lang: json
  content: |
    {
      "compilerOptions": {
        "target": "ES2022",
        "module": "NodeNext",
        "moduleResolution": "NodeNext",
        "strict": true,
        "esModuleInterop": true,
        "outDir": "dist",
        "rootDir": "src",
        "skipLibCheck": true
      },
      "include": ["src/**/*"],
      "exclude": ["node_modules", "dist"]
    }
- type: prose
  content: |
    Tạo một **Drizzle client dùng chung**. Khác Prisma (class `PrismaClient` tự sinh), Drizzle chỉ cần khởi tạo 1 `Pool` (driver `pg` thuần) rồi bọc qua `drizzle()`. Mẹo `globalThis` vẫn giữ nguyên — ngăn `tsx watch` tạo nhiều Pool mỗi lần hot-reload:
- type: code
  filename: api/src/lib/db.ts
  lang: typescript
  content: |
    import { drizzle } from 'drizzle-orm/node-postgres';
    import { Pool } from 'pg';

    // globalThis cache: ngăn tsx watch tạo nhiều Pool khi hot-reload
    const globalForDb = globalThis as unknown as { pool?: Pool };

    export const pool = globalForDb.pool ?? new Pool({ connectionString: process.env.DATABASE_URL });

    if (process.env.NODE_ENV !== 'production') {
      globalForDb.pool = pool;
    }

    export const db = drizzle({ client: pool });
- type: prose
  content: |
    Đây là phần quan trọng nhất bước này: **middleware xử lý lỗi tập trung**. Thay vì mỗi controller tự `try/catch` rồi trả lỗi mỗi kiểu, ta gom về một chỗ. Prisma từng trừu tượng hóa lỗi DB thành mã `P-code` riêng (P2002, P2025...); dùng `pg` trực tiếp thì đọc thẳng **mã lỗi SQLSTATE chuẩn của Postgres** (`23505` = unique_violation, `23503` = foreign_key_violation) — ít lớp trừu tượng hơn, và là kiến thức dùng được với bất kỳ driver Postgres nào, không riêng gì 1 ORM:
- type: code
  filename: api/src/middleware/errorHandler.ts
  lang: typescript
  content: |
    import type { NextFunction, Request, Response } from 'express';

    // AppError: lỗi có chủ ý từ business logic (controller ném ra thay vì lỗi DB thô)
    export class AppError extends Error {
      constructor(
        public readonly statusCode: number,
        public readonly code: string,
        message: string,
      ) {
        super(message);
        this.name = 'AppError';
      }
    }

    // Lỗi PostgreSQL (qua driver `pg`) có SQLSTATE `code` + tên `constraint` vi phạm.
    interface PgError {
      code: string;
      constraint?: string;
    }

    function hasStringCode(err: unknown): err is PgError {
      return typeof err === 'object' && err !== null && 'code' in err
        && typeof (err as { code: unknown }).code === 'string';
    }

    // Drizzle bọc lỗi driver gốc vào DrizzleQueryError, lỗi pg thật nằm ở
    // `.cause` (chuẩn Error cause-chaining của Node) — bóc dần tới khi gặp.
    function extractPgError(err: unknown): PgError | undefined {
      if (hasStringCode(err)) return err;
      if (typeof err === 'object' && err !== null && 'cause' in err) {
        return extractPgError((err as { cause: unknown }).cause);
      }
      return undefined;
    }

    // Error middleware của Express PHẢI có đủ 4 tham số (err, req, res, next)
    export function errorHandler(
      err: unknown,
      _req: Request,
      res: Response,
      _next: NextFunction,
    ): void {
      if (err instanceof AppError) {
        res.status(err.statusCode).json({ error: { code: err.code, message: err.message } });
        return;
      }

      const pgError = extractPgError(err);
      if (pgError) {
        if (pgError.code === '23505') {
          const code = pgError.constraint?.includes('slug') ? 'SLUG_CONFLICT' : 'TAG_NAME_CONFLICT';
          res.status(409).json({ error: { code, message: `Giá trị đã tồn tại (constraint: ${pgError.constraint}).` } });
          return;
        }
        if (pgError.code === '23503') {
          res.status(409).json({ error: { code: 'TAG_IN_USE', message: 'Tag đang gắn bài viết, không thể xóa.' } });
          return;
        }
      }

      console.error('[ERROR 500]', err); // NFR-8: không nuốt lỗi thầm
      res.status(500).json({ error: { code: 'INTERNAL_ERROR', message: 'Đã xảy ra lỗi phía server.' } });
    }
- type: callout
  variant: info
  content: |
    **Vì sao phải bóc `.cause`?** Drizzle không ném thẳng lỗi `pg` gốc — nó bọc vào `DrizzleQueryError` để thêm ngữ cảnh (câu SQL, tham số). Lỗi Postgres thật (với `.code`/`.constraint`) nằm ở `err.cause`. Đây là bẫy dễ gặp: nếu chỉ kiểm `'code' in err` trên lỗi ngoài cùng, `errorHandler` sẽ không bao giờ khớp — mọi lỗi trùng slug/tên đều rơi vào nhánh 500 thay vì 409 đúng nghĩa.
- type: prose
  content: |
    Thêm `notFound` bắt mọi route lạ, rồi ráp tất cả vào `src/index.ts` — điểm khởi động server:
- type: code
  filename: api/src/middleware/notFound.ts
  lang: typescript
  content: |
    import type { Request, Response } from 'express';

    export function notFound(req: Request, res: Response): void {
      res.status(404).json({
        error: { code: 'ROUTE_NOT_FOUND', message: `Route không tồn tại: ${req.method} ${req.path}` },
      });
    }
- type: code
  filename: api/src/index.ts
  lang: typescript
  content: |
    import 'dotenv/config';
    import cors from 'cors';
    import express from 'express';
    import morgan from 'morgan';
    import { errorHandler } from './middleware/errorHandler.js';
    import { notFound } from './middleware/notFound.js';

    const app = express();
    const port = process.env.PORT ?? 3000;

    app.use(cors({ origin: process.env.CORS_ORIGIN }));
    app.use(express.json());
    app.use(morgan('dev'));

    // Health check — verify server sống (không cần DB)
    app.get('/health', (_req, res) => {
      res.json({ status: 'ok', time: new Date().toISOString() });
    });

    // routes articles/tags/search — thêm ở bước 3.3-3.5

    // Fallback — đặt CUỐI, sau tất cả router
    app.use(notFound);
    app.use(errorHandler);

    app.listen(port, () => {
      console.log(`[mini-wiki] API chạy tại http://localhost:${port}`);
    });
- type: callout
  variant: warning
  content: |
    **Vì sao errorHandler phải có đúng 4 tham số (err, req, res, next)?** Express phân biệt *error middleware* với middleware thường **dựa vào số tham số**: hàm 4 tham số được Express coi là handler lỗi. Nếu bạn lỡ bỏ tham số `next` (dù không dùng tới), Express không gọi nó khi có lỗi — và lỗi rơi vào im lặng. Đây là một "gotcha" kinh điển của Express.
