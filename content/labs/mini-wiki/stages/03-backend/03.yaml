id: be-03
title: Viết CRUD API cho Bài viết
order: 3
est_minutes: 50
commit_ref: 83d1949
goal: Viết 5 endpoint CRUD cho Bài viết, kèm tự sinh slug và render Markdown an toàn (chống XSS).
deliverable: api/src/controllers/articles.controller.ts + routes + 3 helper (slug, markdown, articleTags); 5 endpoint hoạt động.
outcome_preview: Bạn sẽ gọi được POST /api/articles tạo bài mới và GET /api/articles/:slug nhận về JSON kèm HTML đã render an toàn.
blocks:
- type: prose
  content: |
    Đây là bước nhiều thịt nhất Chặng 3: viết đủ **CRUD** (Create-Read-Update-Delete) cho Bài viết. Trước hết, 2 helper nhỏ nhưng quan trọng.

    Helper **slug** dùng thư viện `slugify` với `locale: 'vi'` để bỏ dấu tiếng Việt đúng:
- type: command
  label: Cài thêm thư viện xử lý nội dung
  content: cd api && npm install slugify marked isomorphic-dompurify
- type: code
  filename: api/src/lib/slug.ts
  lang: typescript
  content: |
    import slugify from 'slugify';

    // toSlug: chuyển văn bản (kể cả tiếng Việt) → slug URL-safe
    // locale 'vi' → bỏ dấu đúng ("học" → "hoc"), strict → xóa ký tự đặc biệt
    export function toSlug(text: string): string {
      return slugify(text, { lower: true, locale: 'vi', strict: true });
    }
- type: prose
  content: |
    Helper **markdown** là tuyến phòng thủ XSS. `marked` chuyển Markdown → HTML, nhưng HTML thô có thể chứa `<script>` độc hại — `DOMPurify` làm sạch trước khi trả về:
- type: code
  filename: api/src/lib/markdown.ts
  lang: typescript
  content: |
    import DOMPurify from 'isomorphic-dompurify';
    import { marked } from 'marked';

    // Markdown → HTML an toàn: marked.parse render HTML thô, DOMPurify loại bỏ
    // tag/attr nguy hiểm (script, onclick, iframe...). Bỏ bước này → dính XSS.
    export async function renderMarkdown(md: string): Promise<string> {
      const html = await marked.parse(md);
      return DOMPurify.sanitize(html);
    }
- type: prose
  content: |
    Trước khi vào controller: Prisma có `include: { tags: { include: { tag: true } } }` để tự lấy tag lồng theo bài viết. Drizzle **không có include tự động** — đây là đánh đổi có chủ đích của ADR-004 (tường minh hơn, lộ rõ N+1 query là gì). Ta viết 1 helper batch-query dùng chung:
- type: code
  filename: api/src/lib/articleTags.ts
  lang: typescript
  content: |
    import { eq, inArray } from 'drizzle-orm';
    import { db } from './db.js';
    import { articleTags, tags } from '../db/schema.js';

    export type TagSummary = { id: number; name: string; slug: string };

    // Batch-load tags cho nhiều article cùng lúc — tránh N+1 query.
    export async function loadTagsForArticles(articleIds: number[]): Promise<Map<number, TagSummary[]>> {
      const tagMap = new Map<number, TagSummary[]>();
      if (articleIds.length === 0) return tagMap;
      const rows = await db
        .select({ articleId: articleTags.articleId, id: tags.id, name: tags.name, slug: tags.slug })
        .from(articleTags)
        .innerJoin(tags, eq(articleTags.tagId, tags.id))
        .where(inArray(articleTags.articleId, articleIds));
      for (const row of rows) {
        const list = tagMap.get(row.articleId) ?? [];
        list.push({ id: row.id, name: row.name, slug: row.slug });
        tagMap.set(row.articleId, list);
      }
      return tagMap;
    }
- type: prose
  content: |
    Giờ tới controller — chứa logic 5 endpoint. Lưu ý cách `formatArticle` (có content) và `formatListItem` (không content, cho danh sách) khác nhau, đúng hợp đồng API ở Chặng 1. `create`/`update` bọc trong `db.transaction()` — thay cho nested-write ngầm định của Prisma, để đảm bảo bài viết + liên kết tag cùng thành công hoặc cùng rollback:
- type: code
  filename: api/src/controllers/articles.controller.ts
  lang: typescript
  content: |
    import type { Request, Response } from 'express';
    import { count, desc, eq, inArray, sql } from 'drizzle-orm';
    import { AppError } from '../middleware/errorHandler.js';
    import { db } from '../lib/db.js';
    import { articles, articleTags, tags } from '../db/schema.js';
    import { loadTagsForArticles, type TagSummary } from '../lib/articleTags.js';
    import { toSlug } from '../lib/slug.js';
    import { renderMarkdown } from '../lib/markdown.js';

    type ArticleRow = typeof articles.$inferSelect;

    function formatArticle(a: ArticleRow, tagList: TagSummary[], contentHtml?: string) {
      return {
        id: a.id, title: a.title, slug: a.slug, content: a.content,
        ...(contentHtml !== undefined && { content_html: contentHtml }),
        published_at: a.publishedAt, created_at: a.createdAt, updated_at: a.updatedAt,
        tags: tagList,
      };
    }
    const formatListItem = (a: ArticleRow, tagList: TagSummary[]) => ({
      id: a.id, title: a.title, slug: a.slug, published_at: a.publishedAt, tags: tagList,
    });

    // A1 — GET /api/articles  (danh sách, có lọc tag + phân trang)
    export async function list(req: Request, res: Response) {
      const page = Math.max(1, parseInt(req.query.page as string) || 1);
      const limit = Math.min(100, Math.max(1, parseInt(req.query.limit as string) || 20));
      const tagSlug = req.query.tag as string | undefined;
      const where = tagSlug
        ? inArray(articles.id, db.select({ id: articleTags.articleId }).from(articleTags)
            .innerJoin(tags, eq(articleTags.tagId, tags.id)).where(eq(tags.slug, tagSlug)))
        : undefined;
      const [totalRow, rows] = await Promise.all([
        db.select({ value: count() }).from(articles).where(where),
        db.select().from(articles).where(where)
          .orderBy(sql`${articles.publishedAt} DESC NULLS LAST`, desc(articles.id))
          .limit(limit).offset((page - 1) * limit),
      ]);
      const tagMap = await loadTagsForArticles(rows.map((r) => r.id));
      res.json({
        data: rows.map((a) => formatListItem(a, tagMap.get(a.id) ?? [])),
        meta: { total: totalRow[0]?.value ?? 0, page, limit },
      });
    }

    // A3 — GET /api/articles/:slug  (chi tiết, kèm HTML đã render)
    export async function getBySlug(req: Request, res: Response) {
      const slug = String(req.params.slug);
      const [article] = await db.select().from(articles).where(eq(articles.slug, slug)).limit(1);
      if (!article) throw new AppError(404, 'ARTICLE_NOT_FOUND', `Không tìm thấy bài '${slug}'.`);
      const tagMap = await loadTagsForArticles([article.id]);
      const contentHtml = await renderMarkdown(article.content);
      res.json(formatArticle(article, tagMap.get(article.id) ?? [], contentHtml));
    }

    // A2 — POST /api/articles
    export async function create(req: Request, res: Response) {
      const { title, content, published_at, tagIds } = req.body;
      if (!title?.trim()) throw new AppError(400, 'MISSING_FIELD', "Thiếu 'title'.");
      if (!content?.trim()) throw new AppError(400, 'MISSING_FIELD', "Thiếu 'content'.");
      const article = await db.transaction(async (tx) => {
        const [inserted] = await tx.insert(articles).values({
          title, slug: toSlug(title), content,
          publishedAt: published_at ? new Date(published_at) : null,
        }).returning();
        if (tagIds?.length) {
          await tx.insert(articleTags).values(tagIds.map((tagId: number) => ({ articleId: inserted.id, tagId })));
        }
        return inserted;
      });
      const tagMap = await loadTagsForArticles([article.id]);
      res.status(201).json(formatArticle(article, tagMap.get(article.id) ?? []));
    }

    // A4 — PUT /api/articles/:slug  (mọi trường tùy chọn)
    export async function update(req: Request, res: Response) {
      const slug = String(req.params.slug);
      const [existing] = await db.select().from(articles).where(eq(articles.slug, slug)).limit(1);
      if (!existing) throw new AppError(404, 'ARTICLE_NOT_FOUND', `Không tìm thấy bài '${slug}'.`);
      const body = req.body;
      const data: Partial<typeof articles.$inferInsert> = { updatedAt: new Date() };
      if (body.title !== undefined) { data.title = body.title; data.slug = toSlug(body.title); }
      if (body.content !== undefined) data.content = body.content;
      // 'in' để phân biệt "không gửi field" vs "gửi null" (chuyển về bản nháp)
      if ('published_at' in body) data.publishedAt = body.published_at ? new Date(body.published_at) : null;

      const article = await db.transaction(async (tx) => {
        const [updated] = await tx.update(articles).set(data).where(eq(articles.id, existing.id)).returning();
        if (body.tagIds !== undefined) {
          await tx.delete(articleTags).where(eq(articleTags.articleId, existing.id));
          if (body.tagIds.length) {
            await tx.insert(articleTags).values(body.tagIds.map((tagId: number) => ({ articleId: existing.id, tagId })));
          }
        }
        return updated;
      });
      const tagMap = await loadTagsForArticles([article.id]);
      res.json(formatArticle(article, tagMap.get(article.id) ?? []));
    }

    // A5 — DELETE /api/articles/:slug  (article_tags tự xóa cascade)
    export async function remove(req: Request, res: Response) {
      const slug = String(req.params.slug);
      const [existing] = await db.select().from(articles).where(eq(articles.slug, slug)).limit(1);
      if (!existing) throw new AppError(404, 'ARTICLE_NOT_FOUND', `Không tìm thấy bài '${slug}'.`);
      await db.delete(articles).where(eq(articles.id, existing.id));
      res.status(204).send();
    }
- type: prose
  content: |
    Gom 5 handler vào một router, rồi gắn vào `index.ts`:
- type: code
  filename: api/src/routes/articles.routes.ts
  lang: typescript
  content: |
    import { Router } from 'express';
    import * as articles from '../controllers/articles.controller.js';

    const router = Router();
    router.get('/', articles.list);
    router.post('/', articles.create);
    router.get('/:slug', articles.getBySlug);
    router.put('/:slug', articles.update);
    router.delete('/:slug', articles.remove);
    export default router;
- type: code
  filename: api/src/index.ts (thêm 2 dòng)
  lang: typescript
  content: |
    import articlesRouter from './routes/articles.routes.js';
    // ... sau app.use(morgan('dev')):
    app.use('/api/articles', articlesRouter);
- type: callout
  variant: warning
  content: |
    **Đừng bao giờ trả thẳng HTML từ Markdown người dùng mà chưa sanitize.** Nếu ai đó tạo bài viết với nội dung `<script>steal()</script>`, mà bạn render thẳng, đoạn script sẽ chạy trên trình duyệt người đọc — đó là **XSS (Cross-Site Scripting)**. `DOMPurify.sanitize()` ở `renderMarkdown` chính là lá chắn: nó cắt sạch script/event-handler trước khi HTML rời server.
- type: callout
  variant: info
  content: |
    **Một tiểu tiết TypeScript đáng nhớ:** `req.params.slug` trong Express 5 có kiểu `string | string[]` chứ không chỉ `string`. Phải bọc `String(req.params.slug)` để "thu hẹp kiểu" — nếu không, `tsc` (lúc build ở Chặng 6) sẽ báo lỗi, dù chạy `dev` vẫn ổn. Đây là lý do ta luôn build chứ không chỉ chạy dev.
