blocks:
- type: prose
  content: |
    Bước vào giai đoạn **Thiết kế**, việc đầu tiên là chốt công nghệ. Nhưng kỹ sư giỏi không chỉ chọn — họ **ghi lại vì sao chọn**, bằng **ADR (Architecture Decision Record — Biên bản Quyết định Kiến trúc)**.

    Một ADR trả lời 4 câu: bối cảnh nào (**Context**), có những phương án nào (**Options**), chọn gì (**Decision**), và đánh đổi ra sao (**Consequences**). Sáu tháng sau, khi ai đó hỏi "sao hồi đó không dùng X?", ADR trả lời thay bạn.
- type: prose
  content: |
    Tạo thư mục `docs/adr/` và file đầu tiên `ADR-001-techstack.md`. Đây là bản rút gọn — copy vào, sau đó đối chiếu bản đầy đủ ở commit cuối bước:
- type: command
