id: des-02
title: Thiết kế schema database (Drizzle)
order: 2
est_minutes: 30
commit_ref: a8a9d69
goal: Biến ERD thành schema Drizzle thật + migration SQL sinh tự động + biến môi trường mẫu.
deliverable: api/src/db/schema.ts, api/drizzle.config.ts, migration api/drizzle/0000_init.sql, và api/.env.example.
outcome_preview: Bạn sẽ có một schema database chính thức, type-safe, sẵn sàng để Chặng 3 áp vào PostgreSQL thật.
blocks:
- type: prose
  content: |
    ERD ở Chặng 1 là bản vẽ. Giờ ta biến nó thành **schema Drizzle** — khác các ORM schema-first (như Prisma dùng DSL `.prisma` riêng), Drizzle viết schema bằng **TypeScript thuần**: mỗi bảng là 1 hằng số `pgTable(...)`, import thẳng vào code Express để query — không có bước "sinh client" nào cả, vì bản thân file này đã LÀ client.

    Lưu ý cách đặt tên: biến TypeScript viết camelCase (`publishedAt`) nhưng tham số đầu của mỗi cột là tên cột SQL thật, chữ thường snake_case (`'published_at'`) — tương đương `@map` của Prisma nhưng không cần DSL riêng.
- type: prose
  content: |
    Tạo `api/src/db/schema.ts`:
- type: code
  filename: api/src/db/schema.ts
  lang: typescript
  content: |
    // Drizzle Schema — Mini-Wiki v1
    // Sau khi sửa file này: chạy `npm run db:generate` để sinh migration SQL.

    import { sql } from 'drizzle-orm';
    import {
      index, integer, pgTable, primaryKey, serial, text, timestamp, varchar,
    } from 'drizzle-orm/pg-core';

    // ─── articles (Bài viết) ───────────────────────────────
    export const articles = pgTable(
      'articles',
      {
        id: serial('id').primaryKey(),
        title: varchar('title', { length: 255 }).notNull(),
        slug: varchar('slug', { length: 255 }).notNull().unique(),
        content: text('content').notNull(),
        publishedAt: timestamp('published_at', { withTimezone: true }),
        createdAt: timestamp('created_at', { withTimezone: true }).defaultNow().notNull(),
        updatedAt: timestamp('updated_at', { withTimezone: true })
          .defaultNow()
          .notNull()
          .$onUpdate(() => new Date()),
      },
      (table) => [
        index('idx_articles_fts').using(
          'gin',
          sql`to_tsvector('simple', ${table.title} || ' ' || ${table.content})`,
        ),
      ],
    );

    // ─── tags (Nhãn) ───────────────────────────────────────
    export const tags = pgTable('tags', {
      id: serial('id').primaryKey(),
      name: varchar('name', { length: 100 }).notNull().unique(),
      slug: varchar('slug', { length: 100 }).notNull().unique(),
      createdAt: timestamp('created_at', { withTimezone: true }).defaultNow().notNull(),
    });

    // ─── article_tags (Bảng nối nhiều-nhiều) ────────────────
    export const articleTags = pgTable(
      'article_tags',
      {
        articleId: integer('article_id')
          .notNull()
          .references(() => articles.id, { onDelete: 'cascade' }),
        tagId: integer('tag_id')
          .notNull()
          .references(() => tags.id, { onDelete: 'restrict' }),
      },
      (table) => [primaryKey({ columns: [table.articleId, table.tagId] })],
    );
- type: prose
  content: |
    Tạo `api/drizzle.config.ts` — cấu hình cho Drizzle Kit (công cụ CLI sinh migration từ schema):
- type: code
  filename: api/drizzle.config.ts
  lang: typescript
  content: |
    import 'dotenv/config';
    import { defineConfig } from 'drizzle-kit';

    export default defineConfig({
      out: './drizzle',
      schema: './src/db/schema.ts',
      dialect: 'postgresql',
      dbCredentials: {
        url: process.env.DATABASE_URL!,
      },
    });
- type: prose
  content: |
    Chạy `npx drizzle-kit generate` (sẽ cài ở Chặng 3) sẽ tự đọc diff của `schema.ts` và sinh ra file migration SQL dưới `api/drizzle/`. Đây là kết quả — copy tay vào `api/drizzle/0000_init.sql` để đối chiếu ngay (chú ý GIN index cho Full-Text Search ở cuối, giống hệt bản Prisma cũ — DDL không đổi, chỉ khác cách tạo ra):
- type: code
  filename: api/drizzle/0000_init.sql
  lang: sql
  content: |
    CREATE TABLE "article_tags" (
    	"article_id" integer NOT NULL,
    	"tag_id" integer NOT NULL,
    	CONSTRAINT "article_tags_article_id_tag_id_pk" PRIMARY KEY("article_id","tag_id")
    );
    --> statement-breakpoint
    CREATE TABLE "articles" (
    	"id" serial PRIMARY KEY NOT NULL,
    	"title" varchar(255) NOT NULL,
    	"slug" varchar(255) NOT NULL,
    	"content" text NOT NULL,
    	"published_at" timestamp with time zone,
    	"created_at" timestamp with time zone DEFAULT now() NOT NULL,
    	"updated_at" timestamp with time zone DEFAULT now() NOT NULL,
    	CONSTRAINT "articles_slug_unique" UNIQUE("slug")
    );
    --> statement-breakpoint
    CREATE TABLE "tags" (
    	"id" serial PRIMARY KEY NOT NULL,
    	"name" varchar(100) NOT NULL,
    	"slug" varchar(100) NOT NULL,
    	"created_at" timestamp with time zone DEFAULT now() NOT NULL,
    	CONSTRAINT "tags_name_unique" UNIQUE("name"),
    	CONSTRAINT "tags_slug_unique" UNIQUE("slug")
    );
    --> statement-breakpoint
    ALTER TABLE "article_tags" ADD CONSTRAINT "article_tags_article_id_articles_id_fk" FOREIGN KEY ("article_id") REFERENCES "public"."articles"("id") ON DELETE cascade ON UPDATE no action;--> statement-breakpoint
    ALTER TABLE "article_tags" ADD CONSTRAINT "article_tags_tag_id_tags_id_fk" FOREIGN KEY ("tag_id") REFERENCES "public"."tags"("id") ON DELETE restrict ON UPDATE no action;--> statement-breakpoint
    CREATE INDEX "idx_articles_fts" ON "articles" USING gin (to_tsvector('simple', "title" || ' ' || "content"));
- type: callout
  variant: info
  content: |
    **Tên constraint không phải ngẫu nhiên.** Drizzle đặt tên rõ ràng (`articles_slug_unique`, `tags_name_unique`...) thay vì để Postgres tự sinh tên. Điều này quan trọng ở Chặng 3: khi bắt lỗi trùng slug/tên, code đọc `err.constraint` để phân biệt lỗi nào — tên constraint dễ đoán giúp code đó chính xác.
- type: prose
  content: |
    Cuối cùng, tạo `api/.env.example` — file mẫu khai báo biến môi trường. File `.env` **thật** (có mật khẩu) đã bị `.gitignore` chặn; ta chỉ commit file `.example` để người khác biết cần điền gì:
- type: code
  filename: api/.env.example
  lang: bash
  content: |
    # Sao chép thành .env và điền giá trị thật:  cp .env.example .env
    # File .env KHÔNG commit (đã có trong .gitignore).

    # Chuỗi kết nối PostgreSQL
    DATABASE_URL="postgresql://dev:dev@localhost:5432/miniwiki?schema=public"

    # Origin được phép gọi API (CORS) — trỏ tới front-end React/Vite
    CORS_ORIGIN="http://localhost:5173"

    # Port Express server lắng nghe
    PORT=3000
- type: callout
  variant: warning
  content: |
    **Một bẫy tinh vi: published_at phải nullable, KHÔNG đặt `.defaultNow()`.** Trong schema, cột `publishedAt` KHÔNG gọi `.notNull()` (mặc định Drizzle = cho phép NULL). Nếu lỡ thêm `.defaultNow()`, mọi bài tạo ra sẽ tự "đã đăng" ngay — phá vỡ tính năng *bản nháp* (FR-3: bài nháp có `published_at` = NULL). So sánh với `createdAt`/`updatedAt` ngay bên trên: cả hai đều có `.defaultNow().notNull()`, còn `publishedAt` thì không — sự khác biệt này **có chủ đích**.
- type: command
  label: Lưu mốc bước 2.2
  content: |
    git add api/src/db/schema.ts api/drizzle.config.ts api/drizzle api/.env.example
    git commit -m "[step-2.2] Drizzle schema + migration 0000_init + .env.example"
